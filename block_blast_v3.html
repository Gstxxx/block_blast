<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a14" />
  <title>Block Blast</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;min-height:100dvh;width:100%;max-width:100%;overflow-x:hidden;background:#0a0a14;color-scheme:dark;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#gw{
  --board-pad:8px;
  --cell-gap:3px;
  --cell-size:32px;
  --cell-empty:#0d0d24;
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:100%;
  min-height:100dvh;
  padding:max(8px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
  background:#12121f;
  border-radius:0;
  color:#fff;user-select:none;position:relative;transition:transform 0.05s;
}
@media (min-width:640px){
  #gw{
    min-height:auto;
    border-radius:16px;
    max-width:min(100%,520px);
    margin:12px auto;
    padding:12px 8px 18px;
  }
}
#gw.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translate(0)}15%{transform:translate(-5px,2px)}30%{transform:translate(5px,-2px)}45%{transform:translate(-4px,1px)}60%{transform:translate(4px,-1px)}75%{transform:translate(-2px,1px)}90%{transform:translate(2px,0)}}
#hdr{display:flex;gap:6px;margin-bottom:8px;width:100%;justify-content:center;flex-wrap:wrap;padding-right:48px;box-sizing:border-box;}
.undo-icon-btn{
  position:absolute;
  top:max(8px,env(safe-area-inset-top));
  right:max(10px,env(safe-area-inset-right));
  z-index:20;
  width:44px;
  height:44px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1c1c35;
  border:1px solid #2a2a50;
  border-radius:10px;
  color:#9ca3af;
  cursor:pointer;
  transition:border-color 0.15s,color 0.15s;
}
.undo-icon-btn:hover:not(:disabled){border-color:#f472b6;color:#f472b6;}
.undo-icon-btn:disabled{opacity:0.35;cursor:default;}
.undo-icon-btn svg{display:block;}
@media (min-width:640px){
  .undo-icon-btn{
    top:max(12px,env(safe-area-inset-top));
    right:max(8px,env(safe-area-inset-right));
  }
}
.sb{background:#1c1c35;border-radius:10px;padding:5px 10px;text-align:center;border:1px solid #2a2a50;min-width:0;flex:1 1 auto;max-width:min(120px,22vw);}
@media (min-width:400px){
  .sb{padding:6px 14px;min-width:68px;max-width:none;flex:0 1 auto;}
}
.sb.sb-compact{padding:3px 7px;border-radius:8px;flex:0 1 auto;max-width:min(76px,20vw);min-width:52px;}
.sb.sb-compact .sl{font-size:8px;letter-spacing:0.35px;}
.sb.sb-compact .sv{font-size:clamp(11px,3.1vw,14px);}
.sl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;}
@media (min-width:400px){.sl{font-size:10px;letter-spacing:1px;}}
.sv{font-size:clamp(14px,4vw,17px);font-weight:700;color:#f472b6;}
#combo-bar{min-height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
#combo-badge{display:none;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;color:#fff;animation:comboPop 0.3s ease;}
@keyframes comboPop{0%{transform:scale(0.5);opacity:0;}65%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
#mid{
  display:grid;
  width:100%;
  gap:10px;
  justify-items:center;
  align-items:start;
  grid-template-columns:1fr;
  grid-template-areas:
    "next"
    "board"
    "hold";
}
@media (min-width:640px){
  #mid{
    grid-template-columns:auto auto;
    grid-template-rows:auto auto;
    grid-template-areas:
      "hold board"
      "next board";
    justify-content:center;
  }
}
#next-panel{grid-area:next;}
#board-wrap{grid-area:board;}
#hold-panel{grid-area:hold;}
#hold-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
.panel-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
#hold-slot{width:clamp(56px,18vw,72px);height:clamp(56px,18vw,72px);background:#1c1c35;border-radius:10px;border:2px dashed #2a2a50;display:flex;align-items:center;justify-content:center;cursor:grab;flex-direction:column;gap:3px;transition:border-color 0.2s,background 0.2s,opacity 0.15s;position:relative;touch-action:none;}
#hold-slot.has-piece{border-style:solid;border-color:#34d399;}
#hold-slot.drag-src-hold{opacity:0.55;}
#hold-slot:hover:not(.drag-src-hold){border-color:#f472b6;}
#hold-avail{font-size:9px;margin-top:2px;font-weight:600;}
#next-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
#next-slots{display:flex;flex-direction:row;flex-wrap:nowrap;justify-content:center;align-items:center;gap:6px;}
.next-slot{width:clamp(56px,18vw,72px);height:clamp(44px,14vw,56px);background:#1c1c35;border-radius:8px;border:1px solid #2a2a50;display:flex;align-items:center;justify-content:center;}
#grid-toast-wrap{
  position:absolute;
  left:50%;
  bottom:100%;
  transform:translateX(-50%);
  margin-bottom:6px;
  z-index:60;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  pointer-events:none;
  width:min(100%,320px);
}
.grid-toast-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  text-align:center;
  animation:gridToastIn 0.32s ease;
}
.grid-toast-item.fade-out{opacity:0;transition:opacity 0.24s ease;}
.grid-toast-main{font-size:clamp(17px,4.8vw,26px);font-weight:800;color:#fbbf24;text-shadow:0 2px 14px rgba(0,0,0,0.92);}
.grid-toast-sub{font-size:clamp(10px,2.8vw,13px);font-weight:600;color:#cbd5e1;}
.grid-toast-combo{
  font-size:clamp(14px,4vw,20px);
  font-weight:800;
  padding:6px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.28);
  box-shadow:0 6px 20px rgba(0,0,0,0.45);
}
.grid-toast-combo.combo-pink{background:linear-gradient(145deg,#ec4899,#db2777);color:#fff;}
.grid-toast-combo.combo-purple{background:linear-gradient(145deg,#a78bfa,#7c3aed);color:#fff;}
.grid-toast-combo.combo-orange{background:linear-gradient(145deg,#fbbf24,#ea580c);color:#1a0a00;}
@keyframes gridToastIn{0%{transform:scale(0.88);opacity:0;}100%{transform:scale(1);opacity:1;}}
#board-wrap{
  position:relative;
  width:fit-content;
  max-width:100%;
  margin:0 auto;
  display:flex;
  justify-content:center;
}
canvas#pcanvas,canvas#flash-canvas{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}
canvas#pcanvas{z-index:50;}
canvas#flash-canvas{z-index:49;}
#drag-float{
  position:fixed;left:0;top:0;pointer-events:none;z-index:100;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 3px 10px rgba(0,0,0,0.45));
}
#board{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(8,var(--cell-size));
  grid-template-rows:repeat(8,var(--cell-size));
  gap:var(--cell-gap);
  padding:var(--board-pad);
  background:var(--board-bg,#1c1c35);
  border-radius:12px;
  border:2px solid var(--board-border,#2a2a50);
  width:fit-content;
  max-width:100%;
  transition:background 0.45s ease,border-color 0.45s ease;
}
.cell{width:var(--cell-size);height:var(--cell-size);border-radius:6px;background:var(--cell-empty,#0d0d24);position:relative;overflow:hidden;}
.cell.filled{box-shadow:inset 0 2px 3px rgba(255,255,255,0.13),inset 0 -2px 3px rgba(0,0,0,0.4);}
.cell.hl{outline:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.12)!important;}
.cell.inv{outline:2px solid rgba(239,68,68,0.7);background:rgba(239,68,68,0.2)!important;}
.cell.ghost-preview{opacity:0.5;}
.cell.ghost-preview-invalid{
  opacity:0.92!important;
  box-shadow:inset 0 0 0 3px #facc15,inset 0 0 0 5px rgba(0,0,0,0.35)!important;
  filter:brightness(0.88) saturate(1.15);
}
.cell.ghost-invalid-overlap{
  box-shadow:inset 0 0 0 3px #facc15,inset 0 0 0 6px rgba(0,0,0,0.4)!important;
  filter:brightness(0.92);
}
@keyframes flashCell{0%{background:#fff!important;opacity:1;}100%{opacity:0;}}
.cell.flash-clr{animation:flashCell 0.28s ease forwards;}
@keyframes dropBounce{0%{transform:scaleY(0.7) translateY(-6px);opacity:0.6;}60%{transform:scaleY(1.06) translateY(1px);}80%{transform:scaleY(0.97);}100%{transform:scaleY(1) translateY(0);opacity:1;}}
.cell.drop-bounce{animation:dropBounce 0.22s ease forwards;}
.cell.bomb-cell{background:#ff6b35!important;box-shadow:inset 0 0 8px rgba(255,200,0,0.5);}
.bomb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.5vw,17px);}
#pieces-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center;padding:0 4px;max-width:100%;}
.pslot{
  width:clamp(72px,26vw,96px);
  height:clamp(72px,26vw,96px);
  background:#1c1c35;border-radius:12px;border:2px solid #2a2a50;display:flex;align-items:center;justify-content:center;cursor:grab;transition:border-color 0.2s,box-shadow 0.2s;touch-action:none;flex-direction:column;gap:4px;
}
.pslot:not(.used):hover{border-color:#f472b6;box-shadow:0 0 0 3px rgba(244,114,182,0.14);}
.pslot.used{opacity:0.18;pointer-events:none;}
.pslot.drag-src{opacity:0.3;}
.pmini{display:grid;gap:3px;}
.pm-cell{border-radius:3px;}
#diff-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;width:100%;max-width:100%;padding:0 4px;}
#diff-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
#diff-track{flex:1;min-width:0;height:6px;background:#1c1c35;border-radius:3px;border:1px solid #2a2a50;overflow:hidden;max-width:min(200px,45vw);}
#diff-fill{height:100%;background:#f472b6;border-radius:3px;transition:width 0.4s;}
#actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center;padding:0 4px;}
.icon-action-btn{
  width:44px;
  height:44px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1c1c35;
  border:1px solid #2a2a50;
  border-radius:10px;
  color:#9ca3af;
  cursor:pointer;
  transition:border-color 0.15s,color 0.15s;
}
.icon-action-btn:hover{border-color:#34d399;color:#34d399;}
.icon-action-btn svg{display:block;}
.act-btn{background:#1c1c35;border:1px solid #2a2a50;color:#9ca3af;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;transition:all 0.15s;min-height:44px;}
.act-btn:hover:not(:disabled){border-color:#f472b6;color:#f472b6;}
.act-btn:disabled{opacity:0.3;cursor:default;}
#go{display:none;position:absolute;inset:0;background:rgba(12,12,28,0.95);border-radius:16px;flex-direction:column;align-items:center;justify-content:center;gap:7px;z-index:200;padding:16px;}
#go.show{display:flex;}
#go h2{font-size:clamp(18px,5vw,23px);color:#f472b6;margin-bottom:2px;}
.stat-row{display:flex;justify-content:space-between;width:100%;max-width:min(280px,100%);font-size:12px;padding:3px 0;border-bottom:1px solid #2a2a50;}
.stat-row span:first-child{color:#9ca3af;}.stat-row span:last-child{font-weight:700;color:#fff;}
#rbtn{background:#f472b6;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;min-height:44px;}
#rbtn:hover{background:#db2777;}
#lb-section{margin-top:8px;width:100%;max-width:min(280px,100%);}
#lb-section h3{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;text-align:center;}
.lb-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.lb-row span:first-child{color:#9ca3af;}.lb-row span:last-child{color:#fbbf24;font-weight:700;}
#score-pop-wrap{position:absolute;inset:0;pointer-events:none;z-index:150;}
.spop{position:absolute;font-size:clamp(12px,3.5vw,14px);font-weight:700;color:#fbbf24;pointer-events:none;animation:sFly 0.65s ease forwards;white-space:nowrap;}
@keyframes sFly{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-44px);opacity:0;}}
#hint{color:#6b7280;font-size:clamp(10px,2.8vw,11px);margin-top:8px;text-align:center;padding:0 8px;line-height:1.4;}

  </style>
</head>
<body>
  <div id="gw">
    <button type="button" id="undo-btn" class="undo-icon-btn" disabled aria-label="Desfazer" title="Desfazer">

      <div id="next-panel">
        <div class="panel-lbl">Próximas</div>

      </div>

        <div id="grid-toast-wrap" aria-live="polite"></div>

  <script>
const ROWS = 8,
  COLS = 8;
let padPx = 8,
  cellPx = 38,
  gapPx = 3,
  CELL = 41;

function readCssCellSize() {
  const v = getComputedStyle(document.getElementById('gw')).getPropertyValue('--cell-size').trim();
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : 32;
}

function applyResponsiveCellSize() {
  const wrap = document.getElementById('board-wrap');
  const gw = document.getElementById('gw');
  const pad = 8,
    gap = 3;
  let w = wrap.clientWidth;
  if (w < 48) w = Math.max(document.documentElement.clientWidth - 24, 200);
  const cell = Math.floor((w - 2 * pad - 7 * gap) / 8);
  const cellClamped = Math.max(26, Math.min(40, cell));
  gw.style.setProperty('--cell-size', cellClamped + 'px');
}

function syncLayoutMetrics() {
  const boardEl = document.getElementById('board');
  const first = boardEl.querySelector('.cell[data-r="0"][data-c="0"]');
  const second = boardEl.querySelector('.cell[data-r="0"][data-c="1"]');
  const br = boardEl.getBoundingClientRect();
  if (first && second) {
    const fr = first.getBoundingClientRect();
    const sr = second.getBoundingClientRect();
    cellPx = fr.width;
    padPx = fr.left - br.left;
    CELL = sr.left - fr.left;
    gapPx = CELL - cellPx;
  } else {
    cellPx = readCssCellSize();
    gapPx = 3;
    padPx = 8;
    CELL = cellPx + gapPx;
  }
}

function resizeCanvases() {
  const board = document.getElementById('board');
  const w = Math.max(1, Math.round(board.offsetWidth));
  const h = Math.max(1, Math.round(board.offsetHeight));
  if (pcanvas.width !== w || pcanvas.height !== h) {
    pcanvas.width = w;
    pcanvas.height = h;
    fcanvas.width = w;
    fcanvas.height = h;
  }
}
const SHAPES = [
  { c: [[0, 0], [1, 0], [2, 0]], col: '#e94560', sz: 1 },
  { c: [[0, 0], [0, 1], [0, 2]], col: '#e94560', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [3, 0]], col: '#0f9b8e', sz: 2 },
  { c: [[0, 0], [0, 1], [0, 2], [0, 3]], col: '#0f9b8e', sz: 2 },
  { c: [[0, 0], [1, 0], [0, 1], [1, 1]], col: '#f5a623', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [1, 1]], col: '#9b59b6', sz: 1 },
  { c: [[1, 0], [0, 1], [1, 1], [2, 1]], col: '#3498db', sz: 1 },
  { c: [[0, 0], [1, 0], [1, 1], [2, 1]], col: '#2ecc71', sz: 1 },
  { c: [[0, 0], [0, 1], [1, 1]], col: '#1abc9c', sz: 0 },
  { c: [[1, 0], [0, 1], [1, 1]], col: '#e74c3c', sz: 0 },
  { c: [[0, 0], [1, 0], [0, 1]], col: '#f39c12', sz: 0 },
  { c: [[0, 0]], col: '#fbbf24', sz: 0 },
  { c: [[0, 0], [1, 0]], col: '#e94560', sz: 0 },
  { c: [[0, 0], [0, 1]], col: '#3498db', sz: 0 },
  { c: [[0, 0], [1, 0], [2, 0], [0, 1]], col: '#9b59b6', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [2, 1]], col: '#e67e22', sz: 1 },
  { c: [[0, 0], [0, 1], [0, 2], [1, 2]], col: '#16a085', sz: 1 },
  { c: [[1, 0], [1, 1], [0, 2], [1, 2]], col: '#8e44ad', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [0, 1], [1, 1], [2, 1], [0, 2], [1, 2], [2, 2]], col: '#f5a623', sz: 3 },
  { c: [[0, 0], [1, 0], [0, 1], [1, 1], [0, 2], [1, 2]], col: '#e94560', sz: 2 },
];
const BOMB = { c: [[0, 0]], col: '#ff6b35', bomb: true, sz: 0 };

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const hh = h / 60;
  const x = c * (1 - Math.abs((hh % 2) - 1));
  const m = l - c / 2;
  let rp = 0,
    gp = 0,
    bp = 0;
  if (hh < 1) {
    rp = c;
    gp = x;
  } else if (hh < 2) {
    rp = x;
    gp = c;
  } else if (hh < 3) {
    gp = c;
    bp = x;
  } else if (hh < 4) {
    gp = x;
    bp = c;
  } else if (hh < 5) {
    rp = x;
    bp = c;
  } else {
    rp = c;
    bp = x;
  }
  const r = Math.round(255 * (rp + m));
  const g = Math.round(255 * (gp + m));
  const b = Math.round(255 * (bp + m));
  return '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('');
}

function seededRandom(seed) {
  let s = seed >>> 0;
  return () => {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

function applyBoardTheme(lv) {
  const rng = seededRandom(Math.imul(lv, 2654435761) ^ 1597334677);
  const h0 = rng() * 360;
  const h1 = (h0 + 28 + rng() * 48) % 360;
  const h2 = (h0 + 160 + rng() * 40) % 360;
  const bg = hslToHex(h0, 16 + rng() * 18, 8 + rng() * 7);
  const border = hslToHex(h1, 22 + rng() * 22, 18 + rng() * 14);
  const cellEmpty = hslToHex(h2, 28 + rng() * 25, 4 + rng() * 6);
  const gw = document.getElementById('gw');
  const board = document.getElementById('board');

const AC = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ac() {
  if (!actx)
    try {
      actx = new AC();
    } catch (e) {}
  return actx;
}
function tone(f, d, t = 'sine', v = 0.13) {
  const a = ac();
  if (!a) return;
  const o = a.createOscillator(),
    g = a.createGain();
  o.type = t;
  o.frequency.value = f;
  g.gain.setValueAtTime(v, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d);
  o.connect(g);
  g.connect(a.destination);
  o.start();
  o.stop(a.currentTime + d);
}
function sndPlace() {
  tone(200, 0.07, 'square', 0.09);
}
function sndClear(n) {
  [380, 520, 680, 860].slice(0, n).forEach((f, i) => setTimeout(() => tone(f, 0.15, 'sine', 0.15), i * 55));
}
function sndCombo(c) {

}
function sndBomb() {
  tone(70, 0.28, 'sawtooth', 0.18);

}
function sndOver() {

function sndLevel() {

function spawnParticles(cells) {
  syncLayoutMetrics();
  const cx = cellPx / 2;
  cells.forEach(([r, c]) => {
    const x = padPx + c * CELL + cx,
      y = padPx + r * CELL + cx;
    for (let i = 0; i < 9; i++) {
      const a = Math.random() * Math.PI * 2,
        s = 1.5 + Math.random() * 3;
      particles.push({
        x,
        y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 1,
        col: ['#f472b6', '#fbbf24', '#34d399', '#60a5fa', '#fb923c'][Math.floor(Math.random() * 5)],
      });
    }
  });
  if (!animFrame) animP();
}
function animP() {
  pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  particles = particles.filter((p) => p.life > 0.02);
  particles.forEach((p) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.032;
    pctx.globalAlpha = Math.max(0, p.life);
    pctx.fillStyle = p.col;
    pctx.beginPath();
    pctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    pctx.fill();
  });
  pctx.globalAlpha = 1;
  if (particles.length) animFrame = requestAnimationFrame(animP);
  else {
    animFrame = null;
    pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  }
}

function flashLines(cells, cb) {
  syncLayoutMetrics();
  const rad = Math.max(3, cellPx * 0.16);
  let alpha = 1;
  function frame() {
    fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
    fctx.globalAlpha = alpha * 0.85;
    cells.forEach(([r, c]) => {
      fctx.fillStyle = '#fff';
      fctx.beginPath();
      fctx.roundRect(padPx + c * CELL, padPx + r * CELL, cellPx, cellPx, rad);
      fctx.fill();
    });
    alpha -= 0.12;
    if (alpha > 0) requestAnimationFrame(frame);
    else {
      fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
      if (cb) cb();
    }
  }
  requestAnimationFrame(frame);
}

function rndShape() {
  const pool = level >= 3 ? SHAPES : SHAPES.filter((s) => s.sz < 3);
  if (Math.random() < 0.07) return JSON.parse(JSON.stringify(BOMB));
  return pool[Math.floor(Math.random() * pool.length)];
}
function fillQueue() {
  while (nextQueue.length < 6) nextQueue.push(rndShape());
}
function popPieces() {

function buildPieceMini(p, slotW) {
  const { maxC, maxR } = getPieceBox(p);
  const dim = Math.max(maxC, maxR) + 1;
  let cs, gap, boardMode = false;
  if (slotW === 'board') {
    syncLayoutMetrics();
    cs = cellPx;
    gap = gapPx;
    boardMode = true;
  } else {
    gap = 3;
    cs = Math.max(8, Math.min(maxC <= 2 && maxR <= 2 ? 20 : maxC <= 3 && maxR <= 3 ? 15 : 11, Math.floor((slotW - 12) / dim)));
  }
  const mini = document.createElement('div');
  mini.className = 'pmini' + (boardMode ? ' pmini-board' : '');
  mini.style.cssText = `grid-template-columns:repeat(${maxC + 1},${cs}px);grid-template-rows:repeat(${maxR + 1},${cs}px);gap:${gap}px;`;
  const bombFs = boardMode ? Math.max(11, Math.round(cs * 0.42)) + 'px' : '11px';
  for (let r2 = 0; r2 <= maxR; r2++)
    for (let c2 = 0; c2 <= maxC; c2++) {
      const mc = document.createElement('div');
      mc.className = 'pm-cell';
      mc.style.cssText = `width:${cs}px;height:${cs}px;`;
      if (boardMode) mc.style.borderRadius = '6px';

      mc.style.background = filled ? p.col : 'transparent';
      if (filled) mc.style.boxShadow = 'inset 0 1px 2px rgba(255,255,255,0.18)';
      if (p.bomb && filled) {
        mc.style.background = '#ff6b35';
        mc.textContent = '💣';
        mc.style.fontSize = bombFs;
        mc.style.display = 'flex';
        mc.style.alignItems = 'center';
        mc.style.justifyContent = 'center';
      }
      mini.appendChild(mc);
    }
  return mini;
}

function fingerInHoldRect(x, y) {

function startDragFromHold(e) {

function startDrag(e, idx) {

function getBoardRaw(cx, cy) {
  syncLayoutMetrics();
  const boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  return { c: (cx - rect.left - padPx) / CELL, r: (cy - rect.top - padPx) / CELL };
}
/** Cell under pointer: floor so the anchor matches the cell region you point at (not nearest-center round). */
function getBoardSnap(cx, cy) {
  const { r, c } = getBoardRaw(cx, cy);
  return { r: Math.floor(r), c: Math.floor(c) };
}

function getClientPoint(e) {
  const t =
    e.touches && e.touches[0]
      ? e.touches[0]
      : e.changedTouches && e.changedTouches[0]
        ? e.changedTouches[0]
        : e;
  return { x: t.clientX, y: t.clientY };
}

function fingerOrLast(e) {
  const p = getClientPoint(e);
  if (Number.isFinite(p.x) && Number.isFinite(p.y)) return p;
  return lastDragPoint;
}

function canPlace(p, r, c) {
  return p.c.every(([dc, dr]) => {
    const br = r + dr,
      bc = c + dc;
    return br >= 0 && br < ROWS && bc >= 0 && bc < COLS && !board[br][bc];
  });
}

/** Matches endDrag: bomb only needs in-bounds; blocks need empty cells. */
function placementValid(p, r, c) {
  if (!p) return false;
  if (p.bomb) return r >= 0 && r < ROWS && c >= 0 && c < COLS;
  return canPlace(p, r, c);
}

function getGhostSpec(p, r, c) {
  if (!p) return { cells: [], valid: true };
  const cells = p.c.map(([dc, dr]) => [r + dr, c + dc]);
  return { cells, valid: placementValid(p, r, c) };
}

function updateDragPreview(e) {
  const finger = fingerOrLast(e);
  if (!finger) return;
  lastDragPoint = finger;
  const place = getPlacementPoint(finger);
  if (dragging.floatEl) {
    dragging.floatEl.style.left = place.x + 'px';
    dragging.floatEl.style.top = place.y + 'px';
  }
  const { r, c } = getBoardSnap(place.x, place.y);
  snapR = r;
  snapC = c;
  renderBoard(getGhostSpec(dragging.piece, r, c), { fromMoveGhost: true });
}

function getCellEl(r, c) {

function bounceCells(cells) {

    levelLines -= 10;

    sndLevel();
    applyBoardTheme(level);
    updateDiffBar();
  } else updateDiffBar();
}

function clearLines(pr, pc) {
  const toRemove = new Set();
  let cleared = 0;
  for (let r = 0; r < ROWS; r++)
    if (board[r].every((v) => v !== null)) {
      for (let c = 0; c < COLS; c++) toRemove.add(`${r},${c}`);
      cleared++;
    }
  for (let c = 0; c < COLS; c++)
    if (board.every((r) => r[c] !== null)) {
      for (let r = 0; r < ROWS; r++) toRemove.add(`${r},${c}`);
      cleared++;
    }
  if (toRemove.size > 0) {
    const cells = [...toRemove].map((k) => k.split(',').map(Number));
    flashLines(cells, () => {
      toRemove.forEach((k) => {
        const [r, c] = k.split(',').map(Number);
        board[r][c] = null;
      });
      renderBoard();
    });
    spawnParticles(cells);
    sndClear(cleared);
    if (cleared >= 2) doShake();
    comboNoClearStreak = 0;
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    totalLines += cleared;
    checkLevelUp(cleared);
    const lineBonus = cleared * cleared * 10 * ((1 + level * 0.1) | 0);
    const pts = Math.floor(lineBonus * combo);
    score += pts;
    const basePer = Math.floor(lineBonus / cleared);
    const rem = lineBonus - basePer * cleared;
    const stagger = Math.min(150, Math.max(85, 680 / cleared));
    for (let i = 0; i < cleared; i++) {
      const basePart = basePer + (i === cleared - 1 ? rem : 0);
      const partPts = Math.floor(basePart * combo);
      setTimeout(
        () =>
          showGridTopToast('+' + partPts, 'Linha ' + (i + 1) + '/' + cleared + ' · ×' + combo, {
            duration: 760,
          }),
        i * stagger
      );
    }
    if (combo > 1) {
      setTimeout(() => showGridTopCombo(combo), cleared * stagger + 120);
    }
    syncLayoutMetrics();
    document.getElementById('cd').textContent = 'x' + combo;
    document.getElementById('cd').style.color = combo >= 5 ? '#f59e0b' : combo >= 3 ? '#a78bfa' : '#fbbf24';
    return true;
  } else {
    comboNoClearStreak++;
    if (comboNoClearStreak >= 3) {
      combo = 0;
      comboNoClearStreak = 0;
      document.getElementById('cd').textContent = 'x1';
      document.getElementById('cd').style.color = '#fbbf24';
    }
    return false;
  }
}

function updateUndo() {

  btn.title = tip;

}

function doUndo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  board = s.board;
  score = s.score;
  pieces = s.pieces;
  combo = s.combo;
  comboNoClearStreak = s.comboNoClearStreak ?? 0;
  holdPiece = s.holdPiece !== undefined ? (s.holdPiece ? JSON.parse(JSON.stringify(s.holdPiece)) : null) : null;
  totalLines = s.tl;
  level = s.lv;
  levelLines = s.ll;
  updateScore();
  updateUndo();
  updateDiffBar();
  applyBoardTheme(level);
  renderBoard();
  renderPieces();
  renderHold();
}

function checkGameOver() {
  const avail = pieces.filter((p) => p !== null);
  const pieceCanPlace = (p) => {
    if (!p) return false;
    if (p.bomb) return true;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (canPlace(p, r, c)) return true;
    return false;
  };
  const ok =
    avail.some(pieceCanPlace) || (holdPiece && pieceCanPlace(holdPiece));
  if (!ok) {
    showGameOver();
    sndOver();
  }
}

function showGameOver() {
  leaderboard.push(score);
  leaderboard.sort((a, b) => b - a);
  leaderboard = leaderboard.slice(0, 5);
  const sl = document.getElementById('stats-list');
  sl.innerHTML = '';
  [
    { l: 'Pontuação final', v: score },
    { l: 'Nível alcançado', v: level },
    { l: 'Melhor combo', v: 'x' + bestCombo },
    { l: 'Linhas limpas', v: totalLines },
    { l: 'Peças colocadas', v: totalPlaced },
  ].forEach(({ l, v }) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span>${l}</span><span>${v}</span>`;
    sl.appendChild(row);
  });
  const lbr = document.getElementById('lb-rows');
  lbr.innerHTML = '';
  leaderboard.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `<span>${i === 0 ? 'Campeão' : '#' + (i + 1)}</span><span>${s}</span>`;
    lbr.appendChild(row);
  });
  document.getElementById('go').classList.add('show');
}

function endDrag(e) {
  if (!dragging) return;
  document.querySelectorAll('.pslot').forEach((s) => s.classList.remove('drag-src'));
  document.getElementById('hold-slot')?.classList.remove('drag-src-hold');
  removeDragFloat(dragging.floatEl);
  dragging.floatEl = null;
  const finger = fingerOrLast(e);
  if (!finger) {
    dragging = null;
    snapR = null;
    snapC = null;
    lastDragPoint = null;
    renderBoard();
    return;
  }

  if (!dragging.fromHold && fingerInHoldRect(finger.x, finger.y)) {
    undoStack.push({
      board: cloneBoard(),
      score,
      pieces: clonePieces(),
      holdPiece: holdPiece ? JSON.parse(JSON.stringify(holdPiece)) : null,
      combo,
      comboNoClearStreak,
      tl: totalLines,
      lv: level,
      ll: levelLines,
    });
    if (undoStack.length > 3) undoStack.shift();
    updateUndo();
    const prevHold = holdPiece;
    holdPiece = JSON.parse(JSON.stringify(dragging.piece));
    pieces[dragging.idx] = prevHold ? JSON.parse(JSON.stringify(prevHold)) : rndShape();
    renderHold();
    renderPieces();
    renderBoard();
    dragging = null;
    snapR = null;
    snapC = null;
    lastDragPoint = null;
    return;
  }

  const place = getPlacementPoint(finger);
  const { r, c } = getBoardSnap(place.x, place.y);
  const canDrop = dragging.piece.bomb ? r >= 0 && r < ROWS && c >= 0 && c < COLS : canPlace(dragging.piece, r, c);

  if (dragging.fromHold && fingerInHoldRect(finger.x, finger.y)) {
    renderBoard();
    dragging = null;
    snapR = null;
    snapC = null;
    lastDragPoint = null;
    return;
  }

  if (canDrop) {
    undoStack.push({
      board: cloneBoard(),
      score,
      pieces: clonePieces(),
      holdPiece: holdPiece ? JSON.parse(JSON.stringify(holdPiece)) : null,
      combo,
      comboNoClearStreak,
      tl: totalLines,
      lv: level,
      ll: levelLines,
    });
    if (undoStack.length > 3) undoStack.shift();
    updateUndo();
    const placedCells = dragging.piece.bomb ? [] : dragging.piece.c.map(([dc, dr]) => [r + dr, c + dc]);
    if (dragging.piece.bomb) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const br = r + dr,
            bc = c + dc;
          if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS) board[br][bc] = null;
        }
      score += 15;
      sndBomb();
      spawnParticles(
        [
          [r, c],
          [r - 1, c],
          [r + 1, c],
          [r, c - 1],
          [r, c + 1],
        ].filter(([rr, cc]) => rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS)
      );
    } else {
      dragging.piece.c.forEach(([dc, dr]) => {
        board[r + dr][c + dc] = dragging.piece.col;
      });
      score += dragging.piece.c.length;
      sndPlace();
    }
    totalPlaced++;
    renderBoard();
    bounceCells(placedCells);
    if (dragging.fromHold) {
      holdPiece = null;
    } else {
      pieces[dragging.idx] = null;
    }
    clearLines(r, c);
    if (pieces.every((p) => p === null)) {
      popPieces();
    }
    updateScore();
    renderPieces();
    renderHold();
    renderNext();
    setTimeout(checkGameOver, 360);
  } else {
    renderBoard();
  }
  dragging = null;
  snapR = null;
  snapC = null;
  lastDragPoint = null;
}

function restart() {
  if (dragging?.floatEl) removeDragFloat(dragging.floatEl);
  dragging = null;
  snapR = null;
  snapC = null;
  lastDragPoint = null;
  score = 0;
  combo = 0;
  comboNoClearStreak = 0;
  bestCombo = 0;
  totalLines = 0;
  totalPlaced = 0;
  level = 1;
  levelLines = 0;
  holdPiece = null;
  undoStack = [];
  nextQueue = [];
  particles = [];
  document.getElementById('cd').textContent = 'x1';
  document.getElementById('cd').style.color = '#fbbf24';
  document.getElementById('combo-badge').style.display = 'none';
  document.getElementById('grid-toast-wrap')?.replaceChildren();
  pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
  initBoard();
  fillQueue();
  popPieces();
  updateScore();
  updateUndo();
  updateDiffBar();
  applyBoardTheme(level);
  renderBoard();
  renderPieces();
  renderHold();
  renderNext();
  document.getElementById('go').classList.remove('show');
}

document.addEventListener('mousemove', (e) => {
  if (dragging) updateDragPreview(e);
});
document.addEventListener(
  'touchmove',
  (e) => {
    if (dragging) {
      e.preventDefault();
      updateDragPreview(e);
    }
  },
  { passive: false }
);
document.addEventListener('mouseup', (e) => {
  if (dragging) endDrag(e);
});
document.addEventListener('touchend', (e) => {
  if (dragging) endDrag(e);
});
document.addEventListener('touchcancel', (e) => {
  if (dragging) endDrag(e);
});

document.getElementById('hold-panel').addEventListener('mousedown', (e) => {
  if (!holdPiece || dragging) return;
  if (!e.target.closest('#hold-slot')) return;
  startDragFromHold(e);
});
document.getElementById('hold-panel').addEventListener(
  'touchstart',
  (e) => {
    if (!holdPiece || dragging) return;
    if (!e.target.closest('#hold-slot')) return;
    startDragFromHold(e);
  },
  { passive: false }
);
document.getElementById('rbtn').addEventListener('click', restart);
document.getElementById('undo-btn').addEventListener('click', doUndo);

let layoutTimer = null;
function onLayoutChange() {
  clearTimeout(layoutTimer);
  layoutTimer = setTimeout(() => {
    const ghostSpec =
      dragging && snapR != null && snapC != null ? getGhostSpec(dragging.piece, snapR, snapC) : null;
    renderBoard(ghostSpec);
    renderPieces();
    renderHold();
    renderNext();
  }, 120);
}
window.addEventListener('resize', onLayoutChange);
window.addEventListener('orientationchange', onLayoutChange);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onLayoutChange);

restart();

  </script>
