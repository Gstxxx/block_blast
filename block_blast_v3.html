<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a14" />
  <title>Block Blast</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;min-height:100dvh;width:100%;max-width:100%;overflow-x:hidden;background:#0a0a14;color-scheme:dark;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#gw{
  --board-pad:8px;
  --cell-gap:3px;
  --cell-size:32px;
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:100%;
  min-height:100dvh;
  padding:max(8px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
  background:#12121f;
  border-radius:0;
  color:#fff;user-select:none;position:relative;transition:transform 0.05s;
}
@media (min-width:640px){
  #gw{
    min-height:auto;
    border-radius:16px;
    max-width:min(100%,520px);
    margin:12px auto;
    padding:12px 8px 18px;
  }
}
#gw.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translate(0)}15%{transform:translate(-5px,2px)}30%{transform:translate(5px,-2px)}45%{transform:translate(-4px,1px)}60%{transform:translate(4px,-1px)}75%{transform:translate(-2px,1px)}90%{transform:translate(2px,0)}}
#hdr{display:flex;gap:6px;margin-bottom:8px;width:100%;justify-content:center;flex-wrap:wrap;}
.sb{background:#1c1c35;border-radius:10px;padding:5px 10px;text-align:center;border:1px solid #2a2a50;min-width:0;flex:1 1 auto;max-width:min(120px,22vw);}
@media (min-width:400px){
  .sb{padding:6px 14px;min-width:68px;max-width:none;flex:0 1 auto;}
}
.sl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;}
@media (min-width:400px){.sl{font-size:10px;letter-spacing:1px;}}
.sv{font-size:clamp(14px,4vw,17px);font-weight:700;color:#f472b6;}
#combo-bar{min-height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
#combo-badge{display:none;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;color:#fff;animation:comboPop 0.3s ease;}
@keyframes comboPop{0%{transform:scale(0.5);opacity:0;}65%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
#mid{
  display:grid;
  width:100%;
  gap:10px;
  justify-items:center;
  align-items:start;
  grid-template-columns:1fr;
  grid-template-areas:
    "next"
    "board"
    "hold";
}
@media (min-width:640px){
  #mid{
    grid-template-columns:auto auto;
    grid-template-rows:auto auto;
    grid-template-areas:
      "hold board"
      "next board";
    justify-content:center;
  }
}
#next-panel{grid-area:next;}
#board-wrap{grid-area:board;}
#hold-panel{grid-area:hold;}
#hold-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
.panel-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
#hold-slot{width:clamp(56px,18vw,72px);height:clamp(56px,18vw,72px);background:#1c1c35;border-radius:10px;border:2px dashed #2a2a50;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:3px;transition:border-color 0.2s,background 0.2s;position:relative;}
#hold-slot.has-piece{border-style:solid;border-color:#34d399;}
#hold-slot.used-hold{border-color:#4b5563;opacity:0.55;}
#hold-slot:hover:not(.used-hold){border-color:#f472b6;}
#hold-avail{font-size:9px;margin-top:2px;font-weight:600;}
#next-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
#next-slots{display:flex;flex-direction:column;gap:6px;}
.next-slot{width:clamp(56px,18vw,72px);height:clamp(44px,14vw,56px);background:#1c1c35;border-radius:8px;border:1px solid #2a2a50;display:flex;align-items:center;justify-content:center;}
#board-wrap{
  position:relative;
  width:fit-content;
  max-width:100%;
  margin:0 auto;
  display:flex;
  justify-content:center;
}
canvas#pcanvas,canvas#flash-canvas{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}
canvas#pcanvas{z-index:50;}
canvas#flash-canvas{z-index:49;}
#drag-float{
  position:fixed;left:0;top:0;pointer-events:none;z-index:100;
  transform:translate(-50%,-50%) translateY(-20px);
  filter:drop-shadow(0 3px 10px rgba(0,0,0,0.45));
}
#board{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(8,var(--cell-size));
  grid-template-rows:repeat(8,var(--cell-size));
  gap:var(--cell-gap);
  padding:var(--board-pad);
  background:#1c1c35;
  border-radius:12px;
  border:2px solid #2a2a50;
  width:fit-content;
  max-width:100%;
}
.cell{width:var(--cell-size);height:var(--cell-size);border-radius:6px;background:#0d0d24;position:relative;overflow:hidden;}
.cell.filled{box-shadow:inset 0 2px 3px rgba(255,255,255,0.13),inset 0 -2px 3px rgba(0,0,0,0.4);}
.cell.hl{outline:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.12)!important;}
.cell.inv{outline:2px solid rgba(239,68,68,0.7);background:rgba(239,68,68,0.2)!important;}
.cell.ghost-preview{opacity:0.2;}
.cell.ghost-preview-invalid{opacity:0.2;background:#ef4444!important;}
.cell.ghost-invalid-overlap{box-shadow:inset 0 0 0 3px rgba(239,68,68,0.95),inset 0 2px 3px rgba(255,255,255,0.13),inset 0 -2px 3px rgba(0,0,0,0.4);}
@keyframes flashCell{0%{background:#fff!important;opacity:1;}100%{opacity:0;}}
.cell.flash-clr{animation:flashCell 0.28s ease forwards;}
@keyframes dropBounce{0%{transform:scaleY(0.7) translateY(-6px);opacity:0.6;}60%{transform:scaleY(1.06) translateY(1px);}80%{transform:scaleY(0.97);}100%{transform:scaleY(1) translateY(0);opacity:1;}}
.cell.drop-bounce{animation:dropBounce 0.22s ease forwards;}
.cell.bomb-cell{background:#ff6b35!important;box-shadow:inset 0 0 8px rgba(255,200,0,0.5);}
.bomb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.5vw,17px);}
#pieces-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center;padding:0 4px;max-width:100%;}
.pslot{
  width:clamp(72px,26vw,96px);
  height:clamp(72px,26vw,96px);
  background:#1c1c35;border-radius:12px;border:2px solid #2a2a50;display:flex;align-items:center;justify-content:center;cursor:grab;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;touch-action:none;flex-direction:column;gap:4px;
}
.pslot:not(.used):hover{border-color:#f472b6;transform:scale(1.06);box-shadow:0 0 0 3px rgba(244,114,182,0.14);}
.pslot.used{opacity:0.18;pointer-events:none;}
.pslot.drag-src{opacity:0.3;}
.pmini{display:grid;gap:3px;}
.pm-cell{border-radius:3px;}
#diff-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;width:100%;max-width:100%;padding:0 4px;}
#diff-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
#diff-track{flex:1;min-width:0;height:6px;background:#1c1c35;border-radius:3px;border:1px solid #2a2a50;overflow:hidden;max-width:min(200px,45vw);}
#diff-fill{height:100%;background:#f472b6;border-radius:3px;transition:width 0.4s;}
#actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center;padding:0 4px;}
.act-btn{background:#1c1c35;border:1px solid #2a2a50;color:#9ca3af;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;transition:all 0.15s;min-height:44px;}
.act-btn:hover:not(:disabled){border-color:#f472b6;color:#f472b6;}
.act-btn:disabled{opacity:0.3;cursor:default;}
#go{display:none;position:absolute;inset:0;background:rgba(12,12,28,0.95);border-radius:16px;flex-direction:column;align-items:center;justify-content:center;gap:7px;z-index:200;padding:16px;}
#go.show{display:flex;}
#go h2{font-size:clamp(18px,5vw,23px);color:#f472b6;margin-bottom:2px;}
.stat-row{display:flex;justify-content:space-between;width:100%;max-width:min(280px,100%);font-size:12px;padding:3px 0;border-bottom:1px solid #2a2a50;}
.stat-row span:first-child{color:#9ca3af;}.stat-row span:last-child{font-weight:700;color:#fff;}
#rbtn{background:#f472b6;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;min-height:44px;}
#rbtn:hover{background:#db2777;}
#lb-section{margin-top:8px;width:100%;max-width:min(280px,100%);}
#lb-section h3{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;text-align:center;}
.lb-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.lb-row span:first-child{color:#9ca3af;}.lb-row span:last-child{color:#fbbf24;font-weight:700;}
#score-pop-wrap{position:absolute;inset:0;pointer-events:none;z-index:150;}
.spop{position:absolute;font-size:clamp(12px,3.5vw,14px);font-weight:700;color:#fbbf24;pointer-events:none;animation:sFly 0.65s ease forwards;white-space:nowrap;}
@keyframes sFly{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-44px);opacity:0;}}
#hint{color:#6b7280;font-size:clamp(10px,2.8vw,11px);margin-top:8px;text-align:center;padding:0 8px;line-height:1.4;}

  </style>
</head>
<body>
  <div id="gw">
    <div id="hdr">
      <div class="sb"><div class="sl">Pontos</div><div class="sv" id="sd">0</div></div>
      <div class="sb"><div class="sl">Recorde</div><div class="sv" id="bd">0</div></div>
      <div class="sb"><div class="sl">Combo</div><div class="sv" id="cd" style="color:#fbbf24;">x1</div></div>
      <div class="sb"><div class="sl">Linhas</div><div class="sv" id="ld" style="color:#34d399;">0</div></div>
      <div class="sb"><div class="sl">Nível</div><div class="sv" id="lvd" style="color:#60a5fa;">1</div></div>
    </div>
    <div id="diff-bar">
      <div class="panel-lbl" id="diff-label">Progresso do nível</div>
      <div id="diff-track"><div id="diff-fill" style="width:0%"></div></div>
      <div style="font-size:10px;color:#6b7280;" id="diff-next">10 linhas</div>
    </div>
    <div id="combo-bar"><div id="combo-badge"></div></div>
    <div id="mid">
      <div id="next-panel">
        <div class="panel-lbl">Próximas</div>
        <div id="next-slots"></div>
      </div>
      <div id="board-wrap">
        <canvas id="pcanvas" width="1" height="1"></canvas>
        <canvas id="flash-canvas" width="1" height="1"></canvas>
        <div id="board"></div>
        <div id="score-pop-wrap"></div>
        <div id="go">
          <h2>Fim de jogo</h2>
          <div id="stats-list"></div>
          <div id="lb-section"><h3>Ranking</h3><div id="lb-rows"></div></div>
          <button type="button" id="rbtn">Jogar de novo</button>
        </div>
      </div>
      <div id="hold-panel">
        <div class="panel-lbl">Reserva</div>
        <div id="hold-slot">
          <div id="hold-mini"></div>
          <div id="hold-avail" style="color:#34d399;">vazio</div>
        </div>
      </div>
    </div>
    <div id="pieces-row"></div>
    <div id="actions">
      <button type="button" class="act-btn" id="undo-btn" disabled>Desfazer (0)</button>
      <button type="button" class="act-btn" id="hold-piece-btn">Reservar peça</button>
    </div>
    <div id="hint">Arraste para colocar · Encaixa na grelha · Bombas limpam 3×3</div>
  </div>
  <script>
const ROWS = 8,
  COLS = 8;
let padPx = 8,
  cellPx = 38,
  gapPx = 3,
  CELL = 41;

function readCssCellSize() {
  const v = getComputedStyle(document.getElementById('gw')).getPropertyValue('--cell-size').trim();
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : 32;
}

function applyResponsiveCellSize() {
  const wrap = document.getElementById('board-wrap');
  const gw = document.getElementById('gw');
  const pad = 8,
    gap = 3;
  let w = wrap.clientWidth;
  if (w < 48) w = Math.max(document.documentElement.clientWidth - 24, 200);
  const cell = Math.floor((w - 2 * pad - 7 * gap) / 8);
  const cellClamped = Math.max(26, Math.min(40, cell));
  gw.style.setProperty('--cell-size', cellClamped + 'px');
}

function syncLayoutMetrics() {
  const boardEl = document.getElementById('board');
  const first = boardEl.querySelector('.cell[data-r="0"][data-c="0"]');
  const second = boardEl.querySelector('.cell[data-r="0"][data-c="1"]');
  const br = boardEl.getBoundingClientRect();
  if (first && second) {
    const fr = first.getBoundingClientRect();
    const sr = second.getBoundingClientRect();
    cellPx = fr.width;
    padPx = fr.left - br.left;
    CELL = sr.left - fr.left;
    gapPx = CELL - cellPx;
  } else {
    cellPx = readCssCellSize();
    gapPx = 3;
    padPx = 8;
    CELL = cellPx + gapPx;
  }
}

function resizeCanvases() {
  const board = document.getElementById('board');
  const w = Math.max(1, Math.round(board.offsetWidth));
  const h = Math.max(1, Math.round(board.offsetHeight));
  if (pcanvas.width !== w || pcanvas.height !== h) {
    pcanvas.width = w;
    pcanvas.height = h;
    fcanvas.width = w;
    fcanvas.height = h;
  }
}
const SHAPES = [
  { c: [[0, 0], [1, 0], [2, 0]], col: '#e94560', sz: 1 },
  { c: [[0, 0], [0, 1], [0, 2]], col: '#e94560', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [3, 0]], col: '#0f9b8e', sz: 2 },
  { c: [[0, 0], [0, 1], [0, 2], [0, 3]], col: '#0f9b8e', sz: 2 },
  { c: [[0, 0], [1, 0], [0, 1], [1, 1]], col: '#f5a623', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [1, 1]], col: '#9b59b6', sz: 1 },
  { c: [[1, 0], [0, 1], [1, 1], [2, 1]], col: '#3498db', sz: 1 },
  { c: [[0, 0], [1, 0], [1, 1], [2, 1]], col: '#2ecc71', sz: 1 },
  { c: [[0, 0], [0, 1], [1, 1]], col: '#1abc9c', sz: 0 },
  { c: [[1, 0], [0, 1], [1, 1]], col: '#e74c3c', sz: 0 },
  { c: [[0, 0], [1, 0], [0, 1]], col: '#f39c12', sz: 0 },
  { c: [[0, 0]], col: '#fbbf24', sz: 0 },
  { c: [[0, 0], [1, 0]], col: '#e94560', sz: 0 },
  { c: [[0, 0], [0, 1]], col: '#3498db', sz: 0 },
  { c: [[0, 0], [1, 0], [2, 0], [0, 1]], col: '#9b59b6', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [2, 1]], col: '#e67e22', sz: 1 },
  { c: [[0, 0], [0, 1], [0, 2], [1, 2]], col: '#16a085', sz: 1 },
  { c: [[1, 0], [1, 1], [0, 2], [1, 2]], col: '#8e44ad', sz: 1 },
  { c: [[0, 0], [1, 0], [2, 0], [0, 1], [1, 1], [2, 1], [0, 2], [1, 2], [2, 2]], col: '#f5a623', sz: 3 },
  { c: [[0, 0], [1, 0], [0, 1], [1, 1], [0, 2], [1, 2]], col: '#e94560', sz: 2 },
];
const BOMB = { c: [[0, 0]], col: '#ff6b35', bomb: true, sz: 0 };

let board,
  score,
  best = 0,
  pieces,
  nextQueue = [],
  dragging = null;
let combo = 0,
  holdPiece = null,
  holdUsed = false;
let totalLines = 0,
  bestCombo = 0,
  totalPlaced = 0,
  level = 1,
  levelLines = 0;
let undoStack = [];
let leaderboard = [];
let particles = [];
let animFrame = null;
let snapR = null,
  snapC = null;
let lastDragPoint = null;

const pcanvas = document.getElementById('pcanvas');
const pctx = pcanvas.getContext('2d');
const fcanvas = document.getElementById('flash-canvas');
const fctx = fcanvas.getContext('2d');

const AC = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ac() {
  if (!actx)
    try {
      actx = new AC();
    } catch (e) {}
  return actx;
}
function tone(f, d, t = 'sine', v = 0.13) {
  const a = ac();
  if (!a) return;
  const o = a.createOscillator(),
    g = a.createGain();
  o.type = t;
  o.frequency.value = f;
  g.gain.setValueAtTime(v, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d);
  o.connect(g);
  g.connect(a.destination);
  o.start();
  o.stop(a.currentTime + d);
}
function sndPlace() {
  tone(200, 0.07, 'square', 0.09);
}
function sndClear(n) {
  [380, 520, 680, 860].slice(0, n).forEach((f, i) => setTimeout(() => tone(f, 0.15, 'sine', 0.15), i * 55));
}
function sndCombo(c) {
  tone(280 + c * 75, 0.22, 'triangle', 0.18);
}
function sndBomb() {
  tone(70, 0.28, 'sawtooth', 0.18);
  tone(150, 0.18, 'square', 0.12);
}
function sndOver() {
  [280, 230, 185, 140].forEach((f, i) => setTimeout(() => tone(f, 0.28, 'sine', 0.09), i * 110));
}
function sndLevel() {
  [440, 550, 660, 880].forEach((f, i) => setTimeout(() => tone(f, 0.15, 'sine', 0.14), i * 70));
}

function spawnParticles(cells) {
  syncLayoutMetrics();
  const cx = cellPx / 2;
  cells.forEach(([r, c]) => {
    const x = padPx + c * CELL + cx,
      y = padPx + r * CELL + cx;
    for (let i = 0; i < 9; i++) {
      const a = Math.random() * Math.PI * 2,
        s = 1.5 + Math.random() * 3;
      particles.push({
        x,
        y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 1,
        col: ['#f472b6', '#fbbf24', '#34d399', '#60a5fa', '#fb923c'][Math.floor(Math.random() * 5)],
      });
    }
  });
  if (!animFrame) animP();
}
function animP() {
  pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  particles = particles.filter((p) => p.life > 0.02);
  particles.forEach((p) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.032;
    pctx.globalAlpha = Math.max(0, p.life);
    pctx.fillStyle = p.col;
    pctx.beginPath();
    pctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    pctx.fill();
  });
  pctx.globalAlpha = 1;
  if (particles.length) animFrame = requestAnimationFrame(animP);
  else {
    animFrame = null;
    pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  }
}

function flashLines(cells, cb) {
  syncLayoutMetrics();
  const rad = Math.max(3, cellPx * 0.16);
  let alpha = 1;
  function frame() {
    fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
    fctx.globalAlpha = alpha * 0.85;
    cells.forEach(([r, c]) => {
      fctx.fillStyle = '#fff';
      fctx.beginPath();
      fctx.roundRect(padPx + c * CELL, padPx + r * CELL, cellPx, cellPx, rad);
      fctx.fill();
    });
    alpha -= 0.12;
    if (alpha > 0) requestAnimationFrame(frame);
    else {
      fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
      if (cb) cb();
    }
  }
  requestAnimationFrame(frame);
}

function doShake() {
  const gw = document.getElementById('gw');
  gw.classList.remove('shake');
  void gw.offsetWidth;
  gw.classList.add('shake');
  setTimeout(() => gw.classList.remove('shake'), 400);
}

function initBoard() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}
function rndShape() {
  const pool = level >= 3 ? SHAPES : SHAPES.filter((s) => s.sz < 3);
  if (Math.random() < 0.07) return JSON.parse(JSON.stringify(BOMB));
  return pool[Math.floor(Math.random() * pool.length)];
}
function fillQueue() {
  while (nextQueue.length < 6) nextQueue.push(rndShape());
}
function popPieces() {
  fillQueue();
  pieces = [nextQueue.shift(), nextQueue.shift(), nextQueue.shift()];
  fillQueue();
}
function cloneBoard() {
  return board.map((r) => [...r]);
}
function clonePieces() {
  return pieces.map((p) => (p ? JSON.parse(JSON.stringify(p)) : null));
}

function getPieceBox(p) {
  return { maxC: Math.max(...p.c.map(([x]) => x)), maxR: Math.max(...p.c.map(([, y]) => y)) };
}

function renderBoard(ghostSpec = null, opts = {}) {
  if (!opts.fromMoveGhost) applyResponsiveCellSize();
  const cells = ghostSpec?.cells ?? [];
  const valid = ghostSpec?.valid ?? true;
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const d = document.createElement('div');
      const col = board[r][c];
      const inGhost = cells.some(([gr, gc]) => gr === r && gc === c);
      let ghostClass = '';
      if (dragging && inGhost) {
        if (col) {
          if (!valid) ghostClass = ' ghost-invalid-overlap';
        } else {
          ghostClass = valid ? ' ghost-preview' : ' ghost-preview-invalid';
        }
      }
      d.className = 'cell' + (col ? ' filled' : '') + ghostClass;
      if (col) {
        if (col === '#ff6b35') {
          d.classList.add('bomb-cell');
          const ic = document.createElement('div');
          ic.className = 'bomb-icon';
          ic.textContent = '💣';
          d.appendChild(ic);
        } else d.style.background = col;
      } else if (inGhost && dragging && !col && valid) {
        d.style.background = dragging.piece.col;
      }
      d.dataset.r = r;
      d.dataset.c = c;
      el.appendChild(d);
    }
  syncLayoutMetrics();
  resizeCanvases();
}

function renderHold() {
  const slot = document.getElementById('hold-slot');
  const mini = document.getElementById('hold-mini');
  const avail = document.getElementById('hold-avail');
  mini.innerHTML = '';
  slot.className = '';
  if (!holdPiece) {
    avail.textContent = 'vazio';
    avail.style.color = '#4b5563';
    slot.style.borderStyle = 'dashed';
    slot.style.borderColor = '#2a2a50';
    return;
  }
  slot.classList.add('has-piece');
  if (holdUsed) {
    slot.classList.add('used-hold');
    avail.textContent = 'usado';
    avail.style.color = '#6b7280';
  } else {
    avail.textContent = 'pronto';
    avail.style.color = '#34d399';
  }
  const { maxC, maxR } = getPieceBox(holdPiece);
  const cs = maxC <= 2 && maxR <= 2 ? 13 : 10;
  mini.style.cssText = `display:grid;grid-template-columns:repeat(${maxC + 1},${cs}px);grid-template-rows:repeat(${maxR + 1},${cs}px);gap:2px;`;
  for (let r2 = 0; r2 <= maxR; r2++)
    for (let c2 = 0; c2 <= maxC; c2++) {
      const mc = document.createElement('div');
      mc.style.cssText = `width:${cs}px;height:${cs}px;border-radius:2px;`;
      mc.style.background = holdPiece.c.some(([cc, rr]) => cc === c2 && rr === r2) ? holdPiece.col : 'transparent';
      mini.appendChild(mc);
    }
}

function renderNext() {
  const ns = document.getElementById('next-slots');
  ns.innerHTML = '';
  nextQueue.slice(0, 3).forEach((p) => {
    const slot = document.createElement('div');
    slot.className = 'next-slot';
    const { maxC, maxR } = getPieceBox(p);
    const cs = Math.min(10, Math.floor(48 / (Math.max(maxC, maxR) + 1)));
    const mini = document.createElement('div');
    mini.style.cssText = `display:grid;grid-template-columns:repeat(${maxC + 1},${cs}px);grid-template-rows:repeat(${maxR + 1},${cs}px);gap:2px;`;
    for (let r2 = 0; r2 <= maxR; r2++)
      for (let c2 = 0; c2 <= maxC; c2++) {
        const mc = document.createElement('div');
        mc.style.cssText = `width:${cs}px;height:${cs}px;border-radius:2px;`;
        mc.style.background = p.c.some(([cc, rr]) => cc === c2 && rr === r2) ? p.col : 'transparent';
        mini.appendChild(mc);
      }
    slot.appendChild(mini);
    ns.appendChild(slot);
  });
}

function buildPieceMini(p, slotW) {
  const { maxC, maxR } = getPieceBox(p);
  const dim = Math.max(maxC, maxR) + 1;
  const cs = Math.max(8, Math.min(maxC <= 2 && maxR <= 2 ? 20 : maxC <= 3 && maxR <= 3 ? 15 : 11, Math.floor((slotW - 12) / dim)));
  const mini = document.createElement('div');
  mini.className = 'pmini';
  mini.style.cssText = `grid-template-columns:repeat(${maxC + 1},${cs}px);grid-template-rows:repeat(${maxR + 1},${cs}px);gap:3px;`;
  for (let r2 = 0; r2 <= maxR; r2++)
    for (let c2 = 0; c2 <= maxC; c2++) {
      const mc = document.createElement('div');
      mc.className = 'pm-cell';
      mc.style.cssText = `width:${cs}px;height:${cs}px;`;
      const filled = p.c.some(([cc, rr]) => cc === c2 && rr === r2);
      mc.style.background = filled ? p.col : 'transparent';
      if (filled) mc.style.boxShadow = 'inset 0 1px 2px rgba(255,255,255,0.18)';
      if (p.bomb && filled) {
        mc.style.background = '#ff6b35';
        mc.textContent = '💣';
        mc.style.fontSize = '11px';
        mc.style.display = 'flex';
        mc.style.alignItems = 'center';
        mc.style.justifyContent = 'center';
      }
      mini.appendChild(mc);
    }
  return mini;
}

function createDragFloat(p) {
  const wrap = document.createElement('div');
  wrap.id = 'drag-float';
  const slotW = Math.min(96, Math.max(72, Math.floor(window.innerWidth * 0.26)));
  wrap.appendChild(buildPieceMini(p, slotW));
  document.body.appendChild(wrap);
  return wrap;
}

function removeDragFloat(el) {
  if (el && el.parentNode) el.remove();
}

function renderPieces() {
  const row = document.getElementById('pieces-row');
  row.innerHTML = '';
  const slotW = Math.min(96, Math.max(72, Math.floor(window.innerWidth * 0.26)));
  pieces.forEach((p, i) => {
    const slot = document.createElement('div');
    slot.className = 'pslot' + (p === null ? ' used' : '');
    if (p) {
      slot.appendChild(buildPieceMini(p, slotW));
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:10px;color:#6b7280;margin-top:3px;';
      lbl.textContent = p.bomb
        ? 'Bomba'
        : p.c.length + ' ' + (p.c.length > 1 ? 'blocos' : 'bloco');
      slot.appendChild(lbl);
      slot.addEventListener('mousedown', (e) => startDrag(e, i));
      slot.addEventListener(
        'touchstart',
        (e) => startDrag(e, i),
        { passive: false }
      );
    }
    row.appendChild(slot);
  });
}

function swapHold() {
  if (holdUsed) return;
  const fi = pieces.findIndex((p) => p !== null);
  if (fi === -1) return;
  const temp = holdPiece;
  holdPiece = pieces[fi];
  holdUsed = true;
  pieces[fi] = temp || rndShape();
  renderHold();
  renderPieces();
}

function startDrag(e, idx) {
  if (pieces[idx] === null) return;
  e.preventDefault();
  dragging = { idx, piece: pieces[idx], floatEl: createDragFloat(pieces[idx]) };
  snapR = null;
  snapC = null;
  document.querySelectorAll('.pslot')[idx]?.classList.add('drag-src');
  const p0 = getClientPoint(e);
  if (Number.isFinite(p0.x) && Number.isFinite(p0.y)) lastDragPoint = p0;
  updateDragPreview(e);
}

function getBoardRaw(cx, cy) {
  syncLayoutMetrics();
  const boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  return { c: (cx - rect.left - padPx) / CELL, r: (cy - rect.top - padPx) / CELL };
}
/** Cell under pointer: floor so the anchor matches the cell region you point at (not nearest-center round). */
function getBoardSnap(cx, cy) {
  const { r, c } = getBoardRaw(cx, cy);
  return { r: Math.floor(r), c: Math.floor(c) };
}

function getClientPoint(e) {
  const t =
    e.touches && e.touches[0]
      ? e.touches[0]
      : e.changedTouches && e.changedTouches[0]
        ? e.changedTouches[0]
        : e;
  return { x: t.clientX, y: t.clientY };
}

function fingerOrLast(e) {
  const p = getClientPoint(e);
  if (Number.isFinite(p.x) && Number.isFinite(p.y)) return p;
  return lastDragPoint;
}

function canPlace(p, r, c) {
  return p.c.every(([dc, dr]) => {
    const br = r + dr,
      bc = c + dc;
    return br >= 0 && br < ROWS && bc >= 0 && bc < COLS && !board[br][bc];
  });
}

/** Matches endDrag: bomb only needs in-bounds; blocks need empty cells. */
function placementValid(p, r, c) {
  if (!p) return false;
  if (p.bomb) return r >= 0 && r < ROWS && c >= 0 && c < COLS;
  return canPlace(p, r, c);
}

function getGhostSpec(p, r, c) {
  if (!p) return { cells: [], valid: true };
  const cells = p.c.map(([dc, dr]) => [r + dr, c + dc]);
  return { cells, valid: placementValid(p, r, c) };
}

function updateDragPreview(e) {
  const finger = fingerOrLast(e);
  if (!finger) return;
  lastDragPoint = finger;
  if (dragging.floatEl) {
    dragging.floatEl.style.left = finger.x + 'px';
    dragging.floatEl.style.top = finger.y + 'px';
  }
  const { r, c } = getBoardSnap(finger.x, finger.y);
  snapR = r;
  snapC = c;
  renderBoard(getGhostSpec(dragging.piece, r, c), { fromMoveGhost: true });
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function bounceCells(cells) {
  cells.forEach(([r, c]) => {
    const el = getCellEl(r, c);
    if (el) {
      el.classList.remove('drop-bounce');
      void el.offsetWidth;
      el.classList.add('drop-bounce');
    }
  });
}

function showScorePop(pts, x, y) {
  const wrap = document.getElementById('score-pop-wrap');
  const pop = document.createElement('div');
  pop.className = 'spop';
  pop.textContent = '+' + pts;
  pop.style.left = x + 'px';
  pop.style.top = y + 'px';
  wrap.appendChild(pop);
  setTimeout(() => pop.remove(), 680);
}

function showComboBadge(c) {
  const b = document.getElementById('combo-badge');
  b.style.display = 'block';
  if (c >= 5) {
    b.style.background = '#f59e0b';
    b.textContent = 'COMBO MEGA x' + c;
  } else if (c >= 3) {
    b.style.background = '#8b5cf6';
    b.textContent = 'SUPER COMBO x' + c;
  } else {
    b.style.background = '#f472b6';
    b.textContent = 'COMBO x' + c;
  }
  b.style.animation = 'none';
  void b.offsetWidth;
  b.style.animation = 'comboPop 0.3s ease';
  clearTimeout(b._t);
  b._t = setTimeout(() => (b.style.display = 'none'), 1400);
}

function updateDiffBar() {
  const linesPerLevel = 10;
  const prog = Math.min(1, levelLines / linesPerLevel);
  document.getElementById('diff-fill').style.width = prog * 100 + '%';
  document.getElementById('lvd').textContent = level;
  const remaining = linesPerLevel - levelLines;
  document.getElementById('diff-next').textContent = remaining > 0 ? remaining + ' linhas' : 'MÁX';
}

function checkLevelUp(linesCleared) {
  levelLines += linesCleared;
  if (levelLines >= 10) {
    levelLines -= 10;
    level++;
    sndLevel();
    updateDiffBar();
  } else updateDiffBar();
}

function clearLines(pr, pc) {
  const toRemove = new Set();
  let cleared = 0;
  for (let r = 0; r < ROWS; r++)
    if (board[r].every((v) => v !== null)) {
      for (let c = 0; c < COLS; c++) toRemove.add(`${r},${c}`);
      cleared++;
    }
  for (let c = 0; c < COLS; c++)
    if (board.every((r) => r[c] !== null)) {
      for (let r = 0; r < ROWS; r++) toRemove.add(`${r},${c}`);
      cleared++;
    }
  if (toRemove.size > 0) {
    const cells = [...toRemove].map((k) => k.split(',').map(Number));
    flashLines(cells, () => {
      toRemove.forEach((k) => {
        const [r, c] = k.split(',').map(Number);
        board[r][c] = null;
      });
      renderBoard();
    });
    spawnParticles(cells);
    sndClear(cleared);
    if (cleared >= 2) doShake();
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    totalLines += cleared;
    checkLevelUp(cleared);
    const lineBonus = cleared * cleared * 10 * ((1 + level * 0.1) | 0);
    const comboBonus = combo > 1 ? Math.floor(lineBonus * (combo - 1) * 0.5) : 0;
    const pts = lineBonus + comboBonus;
    score += pts;
    if (combo > 1) {
      showComboBadge(combo);
      sndCombo(combo);
    }
    syncLayoutMetrics();
    showScorePop(pts, padPx + pc * CELL + cellPx / 2, padPx + pr * CELL - Math.max(8, cellPx * 0.25));
    document.getElementById('cd').textContent = 'x' + combo;
    document.getElementById('cd').style.color = combo >= 5 ? '#f59e0b' : combo >= 3 ? '#a78bfa' : '#fbbf24';
    return true;
  } else {
    combo = 0;
    document.getElementById('cd').textContent = 'x1';
    document.getElementById('cd').style.color = '#fbbf24';
    return false;
  }
}

function updateScore() {
  if (score > best) best = score;
  document.getElementById('sd').textContent = score;
  document.getElementById('bd').textContent = best;
  document.getElementById('ld').textContent = totalLines;
}
function updateUndo() {
  const btn = document.getElementById('undo-btn');
  btn.textContent = 'Desfazer (' + undoStack.length + ')';
  btn.disabled = undoStack.length === 0;
}

function doUndo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  board = s.board;
  score = s.score;
  pieces = s.pieces;
  combo = s.combo;
  totalLines = s.tl;
  level = s.lv;
  levelLines = s.ll;
  updateScore();
  updateUndo();
  updateDiffBar();
  renderBoard();
  renderPieces();
}

function checkGameOver() {
  const avail = pieces.filter((p) => p !== null);
  const ok = avail.some((p) => {
    if (p.bomb) return true;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (canPlace(p, r, c)) return true;
    return false;
  });
  if (!ok) {
    showGameOver();
    sndOver();
  }
}

function showGameOver() {
  leaderboard.push(score);
  leaderboard.sort((a, b) => b - a);
  leaderboard = leaderboard.slice(0, 5);
  const sl = document.getElementById('stats-list');
  sl.innerHTML = '';
  [
    { l: 'Pontuação final', v: score },
    { l: 'Nível alcançado', v: level },
    { l: 'Melhor combo', v: 'x' + bestCombo },
    { l: 'Linhas limpas', v: totalLines },
    { l: 'Peças colocadas', v: totalPlaced },
  ].forEach(({ l, v }) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span>${l}</span><span>${v}</span>`;
    sl.appendChild(row);
  });
  const lbr = document.getElementById('lb-rows');
  lbr.innerHTML = '';
  leaderboard.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `<span>${i === 0 ? 'Campeão' : '#' + (i + 1)}</span><span>${s}</span>`;
    lbr.appendChild(row);
  });
  document.getElementById('go').classList.add('show');
}

function endDrag(e) {
  if (!dragging) return;
  document.querySelectorAll('.pslot').forEach((s) => s.classList.remove('drag-src'));
  removeDragFloat(dragging.floatEl);
  dragging.floatEl = null;
  const finger = fingerOrLast(e);
  if (!finger) {
    dragging = null;
    snapR = null;
    snapC = null;
    lastDragPoint = null;
    renderBoard();
    return;
  }
  const { r, c } = getBoardSnap(finger.x, finger.y);
  const canDrop = dragging.piece.bomb ? r >= 0 && r < ROWS && c >= 0 && c < COLS : canPlace(dragging.piece, r, c);
  if (canDrop) {
    undoStack.push({
      board: cloneBoard(),
      score,
      pieces: clonePieces(),
      combo,
      tl: totalLines,
      lv: level,
      ll: levelLines,
    });
    if (undoStack.length > 10) undoStack.shift();
    updateUndo();
    holdUsed = false;
    const placedCells = dragging.piece.bomb ? [] : dragging.piece.c.map(([dc, dr]) => [r + dr, c + dc]);
    if (dragging.piece.bomb) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const br = r + dr,
            bc = c + dc;
          if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS) board[br][bc] = null;
        }
      score += 15;
      sndBomb();
      spawnParticles(
        [
          [r, c],
          [r - 1, c],
          [r + 1, c],
          [r, c - 1],
          [r, c + 1],
        ].filter(([rr, cc]) => rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS)
      );
    } else {
      dragging.piece.c.forEach(([dc, dr]) => {
        board[r + dr][c + dc] = dragging.piece.col;
      });
      score += dragging.piece.c.length;
      sndPlace();
    }
    totalPlaced++;
    renderBoard();
    bounceCells(placedCells);
    pieces[dragging.idx] = null;
    clearLines(r, c);
    if (pieces.every((p) => p === null)) {
      popPieces();
      holdUsed = false;
    }
    updateScore();
    renderPieces();
    renderHold();
    renderNext();
    setTimeout(checkGameOver, 360);
  } else {
    renderBoard();
  }
  dragging = null;
  snapR = null;
  snapC = null;
  lastDragPoint = null;
}

function restart() {
  if (dragging?.floatEl) removeDragFloat(dragging.floatEl);
  dragging = null;
  snapR = null;
  snapC = null;
  lastDragPoint = null;
  score = 0;
  combo = 0;
  bestCombo = 0;
  totalLines = 0;
  totalPlaced = 0;
  level = 1;
  levelLines = 0;
  holdPiece = null;
  holdUsed = false;
  undoStack = [];
  nextQueue = [];
  particles = [];
  document.getElementById('cd').textContent = 'x1';
  document.getElementById('cd').style.color = '#fbbf24';
  document.getElementById('combo-badge').style.display = 'none';
  pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
  fctx.clearRect(0, 0, fcanvas.width, fcanvas.height);
  initBoard();
  fillQueue();
  popPieces();
  updateScore();
  updateUndo();
  updateDiffBar();
  renderBoard();
  renderPieces();
  renderHold();
  renderNext();
  document.getElementById('go').classList.remove('show');
}

document.addEventListener('mousemove', (e) => {
  if (dragging) updateDragPreview(e);
});
document.addEventListener(
  'touchmove',
  (e) => {
    if (dragging) {
      e.preventDefault();
      updateDragPreview(e);
    }
  },
  { passive: false }
);
document.addEventListener('mouseup', (e) => {
  if (dragging) endDrag(e);
});
document.addEventListener('touchend', (e) => {
  if (dragging) endDrag(e);
});
document.addEventListener('touchcancel', (e) => {
  if (dragging) endDrag(e);
});

document.getElementById('hold-slot').addEventListener('click', swapHold);
document.getElementById('hold-piece-btn').addEventListener('click', swapHold);
document.getElementById('rbtn').addEventListener('click', restart);
document.getElementById('undo-btn').addEventListener('click', doUndo);

let layoutTimer = null;
function onLayoutChange() {
  clearTimeout(layoutTimer);
  layoutTimer = setTimeout(() => {
    const ghostSpec =
      dragging && snapR != null && snapC != null ? getGhostSpec(dragging.piece, snapR, snapC) : null;
    renderBoard(ghostSpec);
    renderPieces();
    renderHold();
    renderNext();
  }, 120);
}
window.addEventListener('resize', onLayoutChange);
window.addEventListener('orientationchange', onLayoutChange);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onLayoutChange);

restart();

  </script>
