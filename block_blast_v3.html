
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#gw{display:flex;flex-direction:column;align-items:center;padding:12px 8px 18px;background:#12121f;border-radius:16px;color:#fff;user-select:none;position:relative;transition:transform 0.05s;}
#gw.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translate(0)}15%{transform:translate(-5px,2px)}30%{transform:translate(5px,-2px)}45%{transform:translate(-4px,1px)}60%{transform:translate(4px,-1px)}75%{transform:translate(-2px,1px)}90%{transform:translate(2px,0)}}
#hdr{display:flex;gap:8px;margin-bottom:8px;width:100%;justify-content:center;flex-wrap:wrap;}
.sb{background:#1c1c35;border-radius:10px;padding:6px 14px;text-align:center;border:1px solid #2a2a50;min-width:68px;}
.sl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
.sv{font-size:17px;font-weight:700;color:#f472b6;}
#combo-bar{height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
#combo-badge{display:none;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;color:#fff;animation:comboPop 0.3s ease;}
@keyframes comboPop{0%{transform:scale(0.5);opacity:0;}65%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
#mid{display:flex;gap:10px;align-items:flex-start;}
#left-panel{display:flex;flex-direction:column;gap:8px;align-items:center;}
#hold-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
.panel-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
#hold-slot{width:72px;height:72px;background:#1c1c35;border-radius:10px;border:2px dashed #2a2a50;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:3px;transition:border-color 0.2s,background 0.2s;position:relative;}
#hold-slot.has-piece{border-style:solid;border-color:#34d399;}
#hold-slot.used-hold{border-color:#4b5563;opacity:0.55;}
#hold-slot:hover:not(.used-hold){border-color:#f472b6;}
#hold-avail{font-size:9px;margin-top:2px;font-weight:600;}
#next-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
#next-slots{display:flex;flex-direction:column;gap:6px;}
.next-slot{width:72px;height:56px;background:#1c1c35;border-radius:8px;border:1px solid #2a2a50;display:flex;align-items:center;justify-content:center;}
#board-wrap{position:relative;}
canvas#pcanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:50;}
canvas#flash-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:49;}
#board{display:grid;grid-template-columns:repeat(8,38px);grid-template-rows:repeat(8,38px);gap:3px;background:#1c1c35;padding:8px;border-radius:12px;border:2px solid #2a2a50;position:relative;}
.cell{width:38px;height:38px;border-radius:6px;background:#0d0d24;position:relative;overflow:hidden;}
.cell.filled{box-shadow:inset 0 2px 3px rgba(255,255,255,0.13),inset 0 -2px 3px rgba(0,0,0,0.4);}
.cell.hl{outline:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.12)!important;}
.cell.inv{outline:2px solid rgba(239,68,68,0.7);background:rgba(239,68,68,0.2)!important;}
.cell.ghost-snap{opacity:0.32;}
@keyframes flashCell{0%{background:#fff!important;opacity:1;}100%{opacity:0;}}
.cell.flash-clr{animation:flashCell 0.28s ease forwards;}
@keyframes dropBounce{0%{transform:scaleY(0.7) translateY(-6px);opacity:0.6;}60%{transform:scaleY(1.06) translateY(1px);}80%{transform:scaleY(0.97);}100%{transform:scaleY(1) translateY(0);opacity:1;}}
.cell.drop-bounce{animation:dropBounce 0.22s ease forwards;}
.cell.bomb-cell{background:#ff6b35!important;box-shadow:inset 0 0 8px rgba(255,200,0,0.5);}
.bomb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;}
#pieces-row{display:flex;gap:10px;margin-top:12px;justify-content:center;}
.pslot{width:96px;height:96px;background:#1c1c35;border-radius:12px;border:2px solid #2a2a50;display:flex;align-items:center;justify-content:center;cursor:grab;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;touch-action:none;flex-direction:column;gap:4px;}
.pslot:not(.used):hover{border-color:#f472b6;transform:scale(1.06);box-shadow:0 0 0 3px rgba(244,114,182,0.14);}
.pslot.used{opacity:0.18;pointer-events:none;}
.pslot.drag-src{opacity:0.3;}
.pmini{display:grid;gap:3px;}
.pm-cell{border-radius:3px;}
#ghost{position:fixed;pointer-events:none;z-index:9999;display:none;transition:left 0.04s,top 0.04s;}
.gg{display:grid;gap:3px;}
.gc{width:38px;height:38px;border-radius:6px;opacity:0.72;}
#diff-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
#diff-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
#diff-track{width:100px;height:6px;background:#1c1c35;border-radius:3px;border:1px solid #2a2a50;overflow:hidden;}
#diff-fill{height:100%;background:#f472b6;border-radius:3px;transition:width 0.4s;}
#actions{display:flex;gap:8px;margin-top:10px;justify-content:center;}
.act-btn{background:#1c1c35;border:1px solid #2a2a50;color:#9ca3af;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all 0.15s;}
.act-btn:hover:not(:disabled){border-color:#f472b6;color:#f472b6;}
.act-btn:disabled{opacity:0.3;cursor:default;}
#go{display:none;position:absolute;inset:0;background:rgba(12,12,28,0.95);border-radius:16px;flex-direction:column;align-items:center;justify-content:center;gap:7px;z-index:200;padding:16px;}
#go.show{display:flex;}
#go h2{font-size:23px;color:#f472b6;margin-bottom:2px;}
.stat-row{display:flex;justify-content:space-between;width:196px;font-size:12px;padding:3px 0;border-bottom:1px solid #2a2a50;}
.stat-row span:first-child{color:#9ca3af;}.stat-row span:last-child{font-weight:700;color:#fff;}
#rbtn{background:#f472b6;color:#fff;border:none;border-radius:8px;padding:8px 24px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
#rbtn:hover{background:#db2777;}
#lb-section{margin-top:8px;width:196px;}
#lb-section h3{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;text-align:center;}
.lb-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.lb-row span:first-child{color:#9ca3af;}.lb-row span:last-child{color:#fbbf24;font-weight:700;}
#score-pop-wrap{position:absolute;inset:0;pointer-events:none;z-index:150;}
.spop{position:absolute;font-size:14px;font-weight:700;color:#fbbf24;pointer-events:none;animation:sFly 0.65s ease forwards;white-space:nowrap;}
@keyframes sFly{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-44px);opacity:0;}}
#hint{color:#374151;font-size:11px;margin-top:8px;}
</style>

<div id="gw">
  <div id="hdr">
    <div class="sb"><div class="sl">Score</div><div class="sv" id="sd">0</div></div>
    <div class="sb"><div class="sl">Best</div><div class="sv" id="bd">0</div></div>
    <div class="sb"><div class="sl">Combo</div><div class="sv" id="cd" style="color:#fbbf24;">x1</div></div>
    <div class="sb"><div class="sl">Lines</div><div class="sv" id="ld" style="color:#34d399;">0</div></div>
    <div class="sb"><div class="sl">Level</div><div class="sv" id="lvd" style="color:#60a5fa;">1</div></div>
  </div>
  <div id="diff-bar">
    <div class="panel-lbl" id="diff-label">Level progress</div>
    <div id="diff-track"><div id="diff-fill" style="width:0%"></div></div>
    <div style="font-size:10px;color:#6b7280;" id="diff-next">10 lines</div>
  </div>
  <div id="combo-bar"><div id="combo-badge"></div></div>
  <div id="mid">
    <div id="left-panel">
      <div id="hold-panel">
        <div class="panel-lbl">Hold</div>
        <div id="hold-slot" onclick="swapHold()">
          <div id="hold-mini"></div>
          <div id="hold-avail" style="color:#34d399;">empty</div>

        <div class="panel-lbl">Next</div>

    <div id="board-wrap">
      <canvas id="pcanvas" width="328" height="328"></canvas>

  </div>
  <div id="hint">Drag to place · Piece snaps to grid · Bombs clear 3×3</div>
</div>
<div id="ghost"><div class="gg" id="gg"></div></div>

<script>
const ROWS=8,COLS=8,CELL=41;
const SHAPES=[
  {c:[[0,0],[1,0],[2,0]],col:'#e94560',sz:1},
  {c:[[0,0],[0,1],[0,2]],col:'#e94560',sz:1},
  {c:[[0,0],[1,0],[2,0],[3,0]],col:'#0f9b8e',sz:2},
  {c:[[0,0],[0,1],[0,2],[0,3]],col:'#0f9b8e',sz:2},
  {c:[[0,0],[1,0],[0,1],[1,1]],col:'#f5a623',sz:1},
  {c:[[0,0],[1,0],[2,0],[1,1]],col:'#9b59b6',sz:1},
  {c:[[1,0],[0,1],[1,1],[2,1]],col:'#3498db',sz:1},
  {c:[[0,0],[1,0],[1,1],[2,1]],col:'#2ecc71',sz:1},
  {c:[[0,0],[0,1],[1,1]],col:'#1abc9c',sz:0},
  {c:[[1,0],[0,1],[1,1]],col:'#e74c3c',sz:0},
  {c:[[0,0],[1,0],[0,1]],col:'#f39c12',sz:0},
  {c:[[0,0]],col:'#fbbf24',sz:0},
  {c:[[0,0],[1,0]],col:'#e94560',sz:0},
  {c:[[0,0],[0,1]],col:'#3498db',sz:0},
  {c:[[0,0],[1,0],[2,0],[0,1]],col:'#9b59b6',sz:1},
  {c:[[0,0],[1,0],[2,0],[2,1]],col:'#e67e22',sz:1},
  {c:[[0,0],[0,1],[0,2],[1,2]],col:'#16a085',sz:1},
  {c:[[1,0],[1,1],[0,2],[1,2]],col:'#8e44ad',sz:1},
  {c:[[0,0],[1,0],[2,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2]],col:'#f5a623',sz:3},
  {c:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2]],col:'#e94560',sz:2},
];
const BOMB={c:[[0,0]],col:'#ff6b35',bomb:true,sz:0};

let board,score,best=0,pieces,nextQueue=[],dragging=null;
let combo=0,holdPiece=null,holdUsed=false;
let totalLines=0,bestCombo=0,totalPlaced=0,level=1,levelLines=0;
let undoStack=[];
let leaderboard=[];
let particles=[];
let animFrame=null;
let snapR=null,snapC=null;

const pcanvas=document.getElementById('pcanvas');
const pctx=pcanvas.getContext('2d');
const fcanvas=document.getElementById('flash-canvas');
const fctx=fcanvas.getContext('2d');

const AC=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)try{actx=new AC();}catch(e){}return actx;}
function tone(f,d,t='sine',v=0.13){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}
function sndPlace(){tone(200,0.07,'square',0.09);}
function sndClear(n){[380,520,680,860].slice(0,n).forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.15),i*55));}
function sndCombo(c){tone(280+c*75,0.22,'triangle',0.18);}
function sndBomb(){tone(70,0.28,'sawtooth',0.18);tone(150,0.18,'square',0.12);}
function sndOver(){[280,230,185,140].forEach((f,i)=>setTimeout(()=>tone(f,0.28,'sine',0.09),i*110));}
function sndLevel(){[440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.14),i*70));}

function spawnParticles(cells){
  cells.forEach(([r,c])=>{
    const x=8+c*CELL+19,y=8+r*CELL+19;
    for(let i=0;i<9;i++){
      const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:['#f472b6','#fbbf24','#34d399','#60a5fa','#fb923c'][Math.floor(Math.random()*5)]});
    }
  });
  if(!animFrame)animP();
}
function animP(){
  pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
  particles=particles.filter(p=>p.life>0.02);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.032;pctx.globalAlpha=Math.max(0,p.life);pctx.fillStyle=p.col;pctx.beginPath();pctx.arc(p.x,p.y,3,0,Math.PI*2);pctx.fill();});
  pctx.globalAlpha=1;
  if(particles.length)animFrame=requestAnimationFrame(animP);
  else{animFrame=null;pctx.clearRect(0,0,pcanvas.width,pcanvas.height);}
}

function flashLines(cells,cb){
  let alpha=1;
  function frame(){
    fctx.clearRect(0,0,fcanvas.width,fcanvas.height);
    fctx.globalAlpha=alpha*0.85;
    cells.forEach(([r,c])=>{
      fctx.fillStyle='#fff';
      fctx.beginPath();fctx.roundRect(8+c*CELL,8+r*CELL,38,38,6);fctx.fill();
    });
    alpha-=0.12;
    if(alpha>0)requestAnimationFrame(frame);
    else{fctx.clearRect(0,0,fcanvas.width,fcanvas.height);if(cb)cb();}
  }
  requestAnimationFrame(frame);
}

function doShake(){
  const gw=document.getElementById('gw');
  gw.classList.remove('shake');void gw.offsetWidth;gw.classList.add('shake');
  setTimeout(()=>gw.classList.remove('shake'),400);
}

function initBoard(){board=Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function rndShape(){
  const pool=level>=3?SHAPES:SHAPES.filter(s=>s.sz<3);
  if(Math.random()<0.07)return JSON.parse(JSON.stringify(BOMB));
  return pool[Math.floor(Math.random()*pool.length)];
}
function fillQueue(){while(nextQueue.length<6)nextQueue.push(rndShape());}
function popPieces(){fillQueue();pieces=[nextQueue.shift(),nextQueue.shift(),nextQueue.shift()];fillQueue();}
function cloneBoard(){return board.map(r=>[...r]);}
function clonePieces(){return pieces.map(p=>p?JSON.parse(JSON.stringify(p)):null);}

function getDifficultyPool(){
  if(level<=1)return SHAPES.filter(s=>s.sz<=1);
  if(level<=2)return SHAPES.filter(s=>s.sz<=2);
  return SHAPES;
}

function getPieceBox(p){
  return{maxC:Math.max(...p.c.map(([x])=>x)),maxR:Math.max(...p.c.map(([,y])=>y))};
}

function renderBoard(ghostCells=[]){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const d=document.createElement('div');
    const col=board[r][c];
    const isGhost=ghostCells.some(([gr,gc])=>gr===r&&gc===c)&&!col;
    d.className='cell'+(col?' filled':'')+(isGhost?' ghost-snap':'');
    if(col){
      if(col==='#ff6b35'){d.classList.add('bomb-cell');const ic=document.createElement('div');ic.className='bomb-icon';ic.textContent='💣';d.appendChild(ic);}
      else d.style.background=col;
    } else if(isGhost&&dragging){
      d.style.background=dragging.piece.col;
    }
    d.dataset.r=r;d.dataset.c=c;
    el.appendChild(d);
  }
}

function renderHold(){
  const slot=document.getElementById('hold-slot');
  const mini=document.getElementById('hold-mini');
  const avail=document.getElementById('hold-avail');
  mini.innerHTML='';
  slot.className='';
  if(!holdPiece){
    avail.textContent='empty';avail.style.color='#4b5563';
    slot.style.borderStyle='dashed';slot.style.borderColor='#2a2a50';
    return;
  }
  slot.classList.add('has-piece');
  if(holdUsed){slot.classList.add('used-hold');avail.textContent='used';avail.style.color='#6b7280';}
  else{avail.textContent='ready';avail.style.color='#34d399';}
  const {maxC,maxR}=getPieceBox(holdPiece);
  const cs=maxC<=2&&maxR<=2?13:10;
  mini.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);grid-template-rows:repeat(${maxR+1},${cs}px);gap:2px;`;
  for(let r2=0;r2<=maxR;r2++) for(let c2=0;c2<=maxC;c2++){
    const mc=document.createElement('div');
    mc.style.cssText=`width:${cs}px;height:${cs}px;border-radius:2px;`;
    mc.style.background=holdPiece.c.some(([cc,rr])=>cc===c2&&rr===r2)?holdPiece.col:'transparent';
    mini.appendChild(mc);
  }
}

function renderNext(){
  const ns=document.getElementById('next-slots');
  ns.innerHTML='';
  nextQueue.slice(0,3).forEach(p=>{
    const slot=document.createElement('div');
    slot.className='next-slot';
    const {maxC,maxR}=getPieceBox(p);
    const cs=Math.min(10,Math.floor(48/(Math.max(maxC,maxR)+1)));
    const mini=document.createElement('div');
    mini.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);grid-template-rows:repeat(${maxR+1},${cs}px);gap:2px;`;
    for(let r2=0;r2<=maxR;r2++) for(let c2=0;c2<=maxC;c2++){
      const mc=document.createElement('div');
      mc.style.cssText=`width:${cs}px;height:${cs}px;border-radius:2px;`;
      mc.style.background=p.c.some(([cc,rr])=>cc===c2&&rr===r2)?p.col:'transparent';
      mini.appendChild(mc);
    }
    slot.appendChild(mini);
    ns.appendChild(slot);
  });
}

function renderPieces(){
  const row=document.getElementById('pieces-row');
  row.innerHTML='';
  pieces.forEach((p,i)=>{
    const slot=document.createElement('div');
    slot.className='pslot'+(p===null?' used':'');
    if(p){
      const {maxC,maxR}=getPieceBox(p);
      const cs=maxC<=2&&maxR<=2?20:maxC<=3&&maxR<=3?15:11;
      const mini=document.createElement('div');
      mini.className='pmini';
      mini.style.cssText=`grid-template-columns:repeat(${maxC+1},${cs}px);grid-template-rows:repeat(${maxR+1},${cs}px);gap:3px;`;
      for(let r2=0;r2<=maxR;r2++) for(let c2=0;c2<=maxC;c2++){
        const mc=document.createElement('div');
        mc.className='pm-cell';
        mc.style.cssText=`width:${cs}px;height:${cs}px;`;
        const filled=p.c.some(([cc,rr])=>cc===c2&&rr===r2);
        mc.style.background=filled?p.col:'transparent';
        if(filled)mc.style.boxShadow='inset 0 1px 2px rgba(255,255,255,0.18)';
        if(p.bomb&&filled){mc.style.background='#ff6b35';mc.textContent='💣';mc.style.fontSize='11px';mc.style.display='flex';mc.style.alignItems='center';mc.style.justifyContent='center';}
        mini.appendChild(mc);
      }
      slot.appendChild(mini);
      const lbl=document.createElement('div');
      lbl.style.cssText='font-size:10px;color:#6b7280;margin-top:3px;';
      lbl.textContent=p.bomb?'Bomb':p.c.length+' block'+(p.c.length>1?'s':'');
      slot.appendChild(lbl);
      slot.addEventListener('mousedown',e=>startDrag(e,i));
      slot.addEventListener('touchstart',e=>startDrag(e,i),{passive:false});
    }
    row.appendChild(slot);
  });
}

function swapHold(){
  if(holdUsed)return;
  const fi=pieces.findIndex(p=>p!==null);
  if(fi===-1)return;
  const temp=holdPiece;
  holdPiece=pieces[fi];holdUsed=true;
  pieces[fi]=temp||rndShape();
  renderHold();renderPieces();
}

const ghost=document.getElementById('ghost');
const gg=document.getElementById('gg');

function buildGhost(p){
  if(!p)return;
  const {maxC,maxR}=getPieceBox(p);
  gg.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},38px);grid-template-rows:repeat(${maxR+1},38px);gap:3px;`;
  gg.innerHTML='';
  for(let r2=0;r2<=maxR;r2++) for(let c2=0;c2<=maxC;c2++){
    const gc=document.createElement('div');gc.className='gc';
    const filled=p.c.some(([cc,rr])=>cc===c2&&rr===r2);
    gc.style.background=filled?p.col:'transparent';
    if(p.bomb&&filled){gc.textContent='💣';gc.style.cssText='width:38px;height:38px;border-radius:6px;background:#ff6b35;opacity:0.72;display:flex;align-items:center;justify-content:center;font-size:18px;';}
    gg.appendChild(gc);
  }
}

function startDrag(e,idx){
  if(pieces[idx]===null)return;
  e.preventDefault();
  dragging={idx,piece:pieces[idx]};
  snapR=null;snapC=null;
  buildGhost(dragging.piece);
  ghost.style.display='block';
  document.querySelectorAll('.pslot')[idx]?.classList.add('drag-src');
  moveGhost(e);
}

function getBoardRaw(cx,cy){
  const boardEl=document.getElementById('board');
  const rect=boardEl.getBoundingClientRect();
  return{c:(cx-rect.left-8)/CELL,r:(cy-rect.top-8)/CELL};
}
function getBoardSnap(cx,cy){
  const {r,c}=getBoardRaw(cx,cy);
  return{r:Math.round(r),c:Math.round(c)};
}

function canPlace(p,r,c){
  return p.c.every(([dc,dr])=>{const br=r+dr,bc=c+dc;return br>=0&&br<ROWS&&bc>=0&&bc<COLS&&!board[br][bc];});
}
function getGhostCells(p,r,c){
  if(!p||!canPlace(p,r,c))return[];
  return p.c.map(([dc,dr])=>[r+dr,c+dc]);
}

function moveGhost(e){
  const t=e.touches?e.touches[0]:e;
  const {r,c}=getBoardSnap(t.clientX,t.clientY);
  snapR=r;snapC=c;
  const valid=canPlace(dragging.piece,r,c);
  const inBoard=r>=0&&r<ROWS&&c>=0&&c<COLS;
  if(inBoard&&valid){
    const boardEl=document.getElementById('board');
    const rect=boardEl.getBoundingClientRect();
    const {maxC,maxR}=getPieceBox(dragging.piece);
    const snapX=rect.left+8+c*CELL-maxC*CELL/2;
    const snapY=rect.top+8+r*CELL-maxR*CELL/2;
    ghost.style.left=snapX+'px';ghost.style.top=snapY+'px';
  } else {
    ghost.style.left=(t.clientX-38)+'px';ghost.style.top=(t.clientY-38)+'px';
  }
  renderBoard(getGhostCells(dragging.piece,r,c));
}

function getCellEl(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}

function bounceCells(cells){
  cells.forEach(([r,c])=>{
    const el=getCellEl(r,c);
    if(el){el.classList.remove('drop-bounce');void el.offsetWidth;el.classList.add('drop-bounce');}
  });
}

function showScorePop(pts,x,y){
  const wrap=document.getElementById('score-pop-wrap');
  const pop=document.createElement('div');
  pop.className='spop';
  pop.textContent='+'+pts;
  pop.style.left=x+'px';pop.style.top=y+'px';
  wrap.appendChild(pop);
  setTimeout(()=>pop.remove(),680);
}

function showComboBadge(c){
  const b=document.getElementById('combo-badge');
  b.style.display='block';
  if(c>=5){b.style.background='#f59e0b';b.textContent='MEGA COMBO x'+c;}
  else if(c>=3){b.style.background='#8b5cf6';b.textContent='SUPER COMBO x'+c;}
  else{b.style.background='#f472b6';b.textContent='COMBO x'+c;}
  b.style.animation='none';void b.offsetWidth;b.style.animation='comboPop 0.3s ease';
  clearTimeout(b._t);b._t=setTimeout(()=>b.style.display='none',1400);
}

function updateDiffBar(){
  const linesPerLevel=10;
  const prog=Math.min(1,levelLines/linesPerLevel);
  document.getElementById('diff-fill').style.width=(prog*100)+'%';
  document.getElementById('lvd').textContent=level;
  const remaining=linesPerLevel-levelLines;
  document.getElementById('diff-next').textContent=remaining>0?remaining+' lines':'MAX';
}

function checkLevelUp(linesCleared){
  levelLines+=linesCleared;
  if(levelLines>=10){levelLines-=10;level++;sndLevel();updateDiffBar();}
  else updateDiffBar();
}

function clearLines(pr,pc){
  const toRemove=new Set();let cleared=0;
  for(let r=0;r<ROWS;r++) if(board[r].every(v=>v!==null)){for(let c=0;c<COLS;c++)toRemove.add(`${r},${c}`);cleared++;}
  for(let c=0;c<COLS;c++) if(board.every(r=>r[c]!==null)){for(let r=0;r<ROWS;r++)toRemove.add(`${r},${c}`);cleared++;}
  if(toRemove.size>0){
    const cells=[...toRemove].map(k=>k.split(',').map(Number));
    flashLines(cells,()=>{
      toRemove.forEach(k=>{const[r,c]=k.split(',').map(Number);board[r][c]=null;});
      renderBoard();
    });
    spawnParticles(cells);
    sndClear(cleared);
    if(cleared>=2)doShake();
    combo++;bestCombo=Math.max(bestCombo,combo);totalLines+=cleared;
    checkLevelUp(cleared);
    const lineBonus=cleared*cleared*10*(1+level*0.1|0);
    const comboBonus=combo>1?Math.floor(lineBonus*(combo-1)*0.5):0;
    const pts=lineBonus+comboBonus;
    score+=pts;
    if(combo>1){showComboBadge(combo);sndCombo(combo);}
    const bw=document.getElementById('board-wrap').getBoundingClientRect();
    showScorePop(pts,8+pc*CELL+19,8+pr*CELL-10);
    document.getElementById('cd').textContent='x'+combo;
    document.getElementById('cd').style.color=combo>=5?'#f59e0b':combo>=3?'#a78bfa':'#fbbf24';
    return true;
  } else {
    combo=0;document.getElementById('cd').textContent='x1';document.getElementById('cd').style.color='#fbbf24';
    return false;
  }
}

function updateScore(){
  if(score>best)best=score;
  document.getElementById('sd').textContent=score;
  document.getElementById('bd').textContent=best;
  document.getElementById('ld').textContent=totalLines;
}
function updateUndo(){
  const btn=document.getElementById('undo-btn');
  btn.textContent='Undo ('+undoStack.length+')';
  btn.disabled=undoStack.length===0;
}

function doUndo(){
  if(!undoStack.length)return;
  const s=undoStack.pop();
  board=s.board;score=s.score;pieces=s.pieces;combo=s.combo;totalLines=s.tl;level=s.lv;levelLines=s.ll;
  updateScore();updateUndo();updateDiffBar();renderBoard();renderPieces();
}

function checkGameOver(){
  const avail=pieces.filter(p=>p!==null);
  const ok=avail.some(p=>{
    if(p.bomb)return true;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(canPlace(p,r,c))return true;
    return false;
  });
  if(!ok){showGameOver();sndOver();}
}

function showGameOver(){
  leaderboard.push(score);
  leaderboard.sort((a,b)=>b-a);
  leaderboard=leaderboard.slice(0,5);
  const sl=document.getElementById('stats-list');sl.innerHTML='';
  [{l:'Final score',v:score},{l:'Level reached',v:level},{l:'Best combo',v:'x'+bestCombo},{l:'Lines cleared',v:totalLines},{l:'Pieces placed',v:totalPlaced}].forEach(({l,v})=>{
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`<span>${l}</span><span>${v}</span>`;sl.appendChild(row);
  });
  const lbr=document.getElementById('lb-rows');lbr.innerHTML='';
  leaderboard.forEach((s,i)=>{
    const row=document.createElement('div');row.className='lb-row';
    row.innerHTML=`<span>${i===0?'Champion':'#'+(i+1)}</span><span>${s}</span>`;lbr.appendChild(row);
  });
  document.getElementById('go').classList.add('show');
}

function endDrag(e){
  if(!dragging)return;
  ghost.style.display='none';
  document.querySelectorAll('.pslot').forEach(s=>s.classList.remove('drag-src'));
  const t=e.changedTouches?e.changedTouches[0]:e;
  const {r,c}=getBoardSnap(t.clientX,t.clientY);
  const canDrop=dragging.piece.bomb?(r>=0&&r<ROWS&&c>=0&&c<COLS):canPlace(dragging.piece,r,c);
  if(canDrop){
    undoStack.push({board:cloneBoard(),score,pieces:clonePieces(),combo,tl:totalLines,lv:level,ll:levelLines});
    if(undoStack.length>10)undoStack.shift();
    updateUndo();
    holdUsed=false;
    const placedCells=dragging.piece.bomb?[]:dragging.piece.c.map(([dc,dr])=>[r+dr,c+dc]);
    if(dragging.piece.bomb){
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){const br=r+dr,bc=c+dc;if(br>=0&&br<ROWS&&bc>=0&&bc<COLS)board[br][bc]=null;}
      score+=15;sndBomb();
      spawnParticles([[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([rr,cc])=>rr>=0&&rr<ROWS&&cc>=0&&cc<COLS));
    } else {
      dragging.piece.c.forEach(([dc,dr])=>{board[r+dr][c+dc]=dragging.piece.col;});
      score+=dragging.piece.c.length;
      sndPlace();
    }
    totalPlaced++;
    renderBoard();
    bounceCells(placedCells);
    pieces[dragging.idx]=null;
    clearLines(r,c);
    if(pieces.every(p=>p===null)){popPieces();holdUsed=false;}
    updateScore();renderPieces();renderHold();renderNext();
    setTimeout(checkGameOver,360);
  } else {
    renderBoard();
  }
  dragging=null;snapR=null;snapC=null;
}

function restart(){
  score=0;combo=0;bestCombo=0;totalLines=0;totalPlaced=0;level=1;levelLines=0;
  holdPiece=null;holdUsed=false;undoStack=[];nextQueue=[];particles=[];
  document.getElementById('cd').textContent='x1';document.getElementById('cd').style.color='#fbbf24';
  document.getElementById('combo-badge').style.display='none';
  pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
  fctx.clearRect(0,0,fcanvas.width,fcanvas.height);
  initBoard();fillQueue();popPieces();
  updateScore();updateUndo();updateDiffBar();
  renderBoard();renderPieces();renderHold();renderNext();
  document.getElementById('go').classList.remove('show');
}

document.addEventListener('mousemove',e=>{if(dragging)moveGhost(e);});
document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();moveGhost(e);}},{passive:false});
document.addEventListener('mouseup',e=>{if(dragging)endDrag(e);});
document.addEventListener('touchend',e=>{if(dragging)endDrag(e);});

restart();
</script>
